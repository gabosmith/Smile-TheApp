<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMILE — Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEEAE4;
    --surface: #F5F2EE;
    --white: #FDFCFB;
    --dark: #1E1C1A;
    --mid: #9C9189;
    --light: #CEC8C0;
    --terracota: #C4856A;
    --rosa: #E8C4B8;
    --azul: #7B8FA1;
    --green: #6B8F71;
    --red: #C47070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 300;
    background: var(--bg);
    color: var(--dark);
    -webkit-font-smoothing: antialiased;
  }

  /* ── LOGIN ── */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
  }

  .login-card {
    background: var(--white);
    border-radius: 24px;
    padding: 48px;
    width: 360px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  }

  .login-logo {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 7px;
    color: var(--dark);
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--terracota);
    margin-bottom: 40px;
  }

  .login-field { margin-bottom: 16px; }
  .login-field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); margin-bottom: 8px; }
  .login-field input {
    width: 100%;
    padding: 14px 18px;
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 300;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .login-field input:focus { border-color: var(--terracota); }

  .login-error { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }

  .login-btn {
    width: 100%;
    padding: 16px;
    background: var(--dark);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .login-btn:hover { background: var(--terracota); }

  /* ── LAYOUT ── */
  .app { display: none; min-height: 100vh; }
  .app.visible { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 0;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .sidebar-logo {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 6px;
    color: var(--surface);
    padding: 0 28px;
    margin-bottom: 4px;
  }

  .sidebar-role {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--terracota);
    padding: 0 28px;
    margin-bottom: 40px;
  }

  .sidebar-nav { flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 28px;
    font-size: 13px;
    color: #6B635C;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 2px solid transparent;
  }

  .nav-item:hover { color: var(--surface); }
  .nav-item.active { color: var(--surface); border-left-color: var(--terracota); background: rgba(255,255,255,0.04); }
  .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-bottom {
    padding: 0 28px;
    border-top: 1px solid #2C2A28;
    padding-top: 24px;
    margin-top: 24px;
  }

  .sidebar-version { font-size: 11px; color: #3A3836; letter-spacing: 1px; }

  .logout-btn {
    font-size: 12px;
    color: #4A4440;
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    padding: 8px 0;
    transition: color 0.2s;
    display: block;
    margin-top: 8px;
  }
  .logout-btn:hover { color: var(--red); }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 40px 48px;
  }

  /* PAGE HEADER */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
  }

  .page-title { font-size: 32px; font-weight: 200; letter-spacing: -1px; color: var(--dark); }
  .page-sub { font-size: 14px; color: var(--mid); margin-top: 4px; }

  .header-btn {
    background: var(--dark);
    color: var(--white);
    border: none;
    padding: 14px 28px;
    border-radius: 100px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 4px 16px rgba(30,28,26,0.15);
  }
  .header-btn:hover { background: var(--terracota); }

  /* TABS */
  .tab-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 32px;
    background: var(--white);
    border-radius: 14px;
    padding: 4px;
    width: fit-content;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .tab-btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--mid);
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    transition: all 0.2s;
  }

  .tab-btn.active { background: var(--dark); color: var(--white); }

  /* ── OVERVIEW STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--white);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }

  .stat-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); margin-bottom: 16px; }
  .stat-val { font-size: 36px; font-weight: 200; letter-spacing: -1px; color: var(--dark); margin-bottom: 8px; }
  .stat-sub { font-size: 12px; color: var(--light); }
  .stat-accent { width: 32px; height: 3px; border-radius: 2px; margin-bottom: 16px; }

  /* ── CLINICS TABLE ── */
  .section-title { font-size: 18px; font-weight: 400; color: var(--dark); margin-bottom: 20px; }

  .clinics-table {
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 32px;
  }

  .table-header {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 80px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--bg);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--light);
  }

  .clinic-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 80px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--surface);
    align-items: center;
    transition: background 0.15s;
    cursor: pointer;
  }
  .clinic-row:last-child { border-bottom: none; }
  .clinic-row:hover { background: var(--surface); }

  .clinic-name { font-size: 14px; font-weight: 400; color: var(--dark); }
  .clinic-id { font-size: 11px; color: var(--light); margin-top: 2px; letter-spacing: 1px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 400;
  }

  .badge-active { background: rgba(107,143,113,0.12); color: var(--green); }
  .badge-trial  { background: rgba(196,133,106,0.12); color: var(--terracota); }
  .badge-paused { background: rgba(196,112,112,0.12); color: var(--red); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .plan-tag {
    font-size: 11px;
    color: var(--mid);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .amount { font-size: 15px; font-weight: 400; color: var(--dark); }
  .amount-sub { font-size: 11px; color: var(--light); }

  .row-actions { display: flex; gap: 8px; }

  .action-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--light);
    background: none;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--mid);
  }
  .action-btn:hover { border-color: var(--terracota); color: var(--terracota); background: rgba(196,133,106,0.06); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 64px 32px;
    color: var(--mid);
  }
  .empty-icon { font-size: 40px; margin-bottom: 16px; }
  .empty-title { font-size: 18px; font-weight: 300; margin-bottom: 8px; color: var(--dark); }
  .empty-sub { font-size: 14px; color: var(--mid); }

  /* LOADING */
  .loading-row {
    padding: 48px;
    text-align: center;
    color: var(--light);
    font-size: 13px;
    letter-spacing: 2px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,28,26,0.5);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 24px;
    width: 100%;
    max-width: 560px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    animation: modalIn 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-header {
    padding: 32px 32px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .modal-title { font-size: 24px; font-weight: 200; letter-spacing: -0.5px; color: var(--dark); }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--light); line-height: 1; }
  .modal-close:hover { color: var(--dark); }

  .modal-body { padding: 24px 32px 32px; }

  .modal-field { margin-bottom: 20px; }
  .modal-field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); margin-bottom: 8px; }
  .modal-field input, .modal-field select {
    width: 100%;
    padding: 14px 18px;
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 300;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--terracota); }

  .modal-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modules-check-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .module-check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--mid);
  }
  .module-check-item:hover { background: var(--surface); }
  .module-check-item.checked { background: rgba(196,133,106,0.08); color: var(--dark); }

  .module-check-item input[type="checkbox"] { accent-color: var(--terracota); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 28px;
  }

  .btn-cancel {
    padding: 12px 24px;
    background: none;
    border: 1px solid var(--light);
    border-radius: 100px;
    font-size: 13px;
    font-family: inherit;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--dark); color: var(--dark); }

  .btn-save {
    padding: 12px 28px;
    background: var(--dark);
    color: var(--white);
    border: none;
    border-radius: 100px;
    font-size: 13px;
    letter-spacing: 1px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-save:hover { background: var(--terracota); }

  /* DETAIL VIEW */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .detail-card {
    background: var(--bg);
    border-radius: 14px;
    padding: 18px 20px;
  }

  .detail-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); margin-bottom: 6px; }
  .detail-val { font-size: 16px; color: var(--dark); font-weight: 400; }

  .link-card {
    background: var(--dark);
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .link-card:hover { background: var(--terracota); }
  .link-url { font-size: 14px; color: var(--rosa); letter-spacing: 1px; font-family: monospace; }
  .link-copy { font-size: 11px; color: var(--light); }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .section { animation: fadeIn 0.3s ease; }

  /* PILL counts in header */
  .count-pill {
    display: inline-flex;
    align-items: center;
    background: var(--surface);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--mid);
    margin-left: 10px;
    vertical-align: middle;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--dark);
    color: var(--white);
    padding: 14px 24px;
    border-radius: 100px;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">SMILE</div>
    <div class="login-sub">Panel de administración</div>
    <div class="login-field">
      <label>Email</label>
      <input type="text" id="loginEmail" placeholder="Usuario" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-error" id="loginError">Credenciales incorrectas</div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">SMILE</div>
    <div class="sidebar-role">Admin</div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="showSection('overview')">
        <span class="nav-icon">📊</span> Overview
      </div>
      <div class="nav-item" onclick="showSection('clinicas')">
        <span class="nav-icon">🏥</span> Clínicas
      </div>
      <div class="nav-item" onclick="showSection('nueva')">
        <span class="nav-icon">✦</span> Nueva clínica
      </div>


    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-version">SMILE.app v1.0</div>
      <button class="logout-btn" onclick="doLogout()">Cerrar sesión →</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <!-- content injected by JS -->
  </div>
</div>

<!-- MODAL: DETALLE CLÍNICA -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Clínica</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── FIREBASE ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCzb-ZWetwx9Uy4WhJxBiwzJsZGgmrL_nc",
  authDomain: "clinica-dental-dra-smith.firebaseapp.com",
  projectId: "clinica-dental-dra-smith",
  storageBucket: "clinica-dental-dra-smith.firebasestorage.app",
  messagingSenderId: "845983933030",
  appId: "1:845983933030:web:cc0b5a3724be89c86c43a7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── AUTH ──────────────────────────────────────────────
// Credenciales hardcoded de admin SMILE (tú solo)
// Cuando quieras cambiarlas, cámbialas aquí
const ADMIN_CREDS = { user: 'gabo', password: '4498' };

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (email === ADMIN_CREDS.user && pass === ADMIN_CREDS.password) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    initApp();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPass').value = '';
}

// ── STATE ─────────────────────────────────────────────
let clinicas = [];
let currentSection = 'overview';

// ── INIT ──────────────────────────────────────────────
async function initApp() {
  await loadClinicas();
  showSection('overview');
}

async function recargarAdmin() {
  const btn = document.querySelector('[onclick="recargarAdmin()"]');
  if (btn) { btn.textContent = '↻ Cargando...'; btn.disabled = true; }
  await loadClinicas();
  showSection(currentSection);
  if (btn) { btn.textContent = '↻ Actualizar'; btn.disabled = false; }
}

async function loadClinicas() {
  try {
    const snap = await db.collection('clinicas').get();
    clinicas = await Promise.all(snap.docs.map(async doc => {
      const data = doc.data();
      // Load config sub-doc if exists
      let config = {};
      try {
        const cfgDoc = await db.collection('clinicas').doc(doc.id)
          .collection('config').doc('settings').get();
        if (cfgDoc.exists) config = cfgDoc.data();
      } catch(e) {}

      // Count patients
      let pacientes = 0;
      try {
        const pacSnap = await db.collection('clinicas').doc(doc.id)
          .collection('pacientes').get();
        pacientes = pacSnap.size;
      } catch(e) {
        pacientes = (data.pacientes || []).length;
      }

      return {
        id: doc.id,
        nombre: config.nombre || data.nombre || doc.id,
        ciudad: config.ciudad || data.ciudad || '—',
        color: config.color || '#C4856A',
        plan: config.plan || 'clinica',
        modulos: config.modulos || [],
        activa: config.activa !== false,
        trial: config.trialHasta ? new Date(config.trialHasta) > new Date() : false,
        trialHasta: config.trialHasta || null,
        adminEmail: config.adminEmail || '—',
        creadaEn: config.creadaEn || data.lastUpdated || null,
        migratedAt: data.migratedAt || null,
        pacientes,
        facturas: (data.facturas || []).length,
        citas: (data.citas || []).length,
        personalCount: (data.personal || []).length,
        // Calculate MRR from plan + modules
        mrr: calcMRR(config.plan, config.modulos, (data.personal||[]).length),
        raw: data,
        config,
      };
    }));
  } catch(e) {
    console.error('Error loading clinicas:', e);
    clinicas = [];
  }
}

function calcMRR(plan, modulos = [], personalCount = 0) {
  const BASE = plan === 'solo' ? 990 : 1200;
  const MODULE_PRICES = {
    laboratorio: 300, nomina: 300, inventario: 300,
    reportes: 300, multisucursal: 800,
    // ncf y expediente: incluidos en el plan base
  };
  const extraUsers = Math.max(0, personalCount - 1);
  const modulesTotal = (modulos || []).reduce((s, m) => s + (MODULE_PRICES[m] || 0), 0);
  return BASE + modulesTotal + (extraUsers * 150);
}

// ── SECTIONS ──────────────────────────────────────────
function showSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const idx = ['overview','clinicas','nueva'].indexOf(section);
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');

  const main = document.getElementById('main');
  if (section === 'overview') renderOverview(main);
  else if (section === 'clinicas') renderClinicas(main);
  else if (section === 'nueva') renderNuevaClinica(main);

}

// ── OVERVIEW ──────────────────────────────────────────

// ── CLÍNICAS ──────────────────────────────────────────
function renderClinicas(main) {
  main.innerHTML = `
    <div class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Clínicas <span class="count-pill">${clinicas.length}</span></div>
          <div class="page-sub">Todas las clínicas registradas en SMILE.app</div>
        </div>
        <button class="header-btn" onclick="showSection('nueva')">+ Nueva clínica</button>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="filterClinicas('todas', this)">Todas</button>
        <button class="tab-btn" onclick="filterClinicas('activas', this)">Activas</button>
        <button class="tab-btn" onclick="filterClinicas('trial', this)">En trial</button>
      </div>

      <div id="clinicasTableWrap">
        ${renderClinicsTable(clinicas)}
      </div>
    </div>
  `;
}

function filterClinicas(filter, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let list = clinicas;
  if (filter === 'activas') list = clinicas.filter(c => c.activa && !c.trial);
  if (filter === 'trial')   list = clinicas.filter(c => c.trial);
  document.getElementById('clinicasTableWrap').innerHTML = renderClinicsTable(list);
}

function renderClinicsTable(list) {
  if (list.length === 0) {
    return `<div class="clinics-table">
      <div class="empty-state">
        <div class="empty-icon">🏥</div>
        <div class="empty-title">Sin clínicas registradas</div>
        <div class="empty-sub">Agrega tu primera clínica para comenzar</div>
      </div>
    </div>`;
  }

  const rows = list.map(c => {
    const statusBadge = c.trial
      ? `<span class="badge badge-trial"><span class="badge-dot"></span>Trial</span>`
      : c.activa
        ? `<span class="badge badge-active"><span class="badge-dot"></span>Activa</span>`
        : `<span class="badge badge-paused"><span class="badge-dot"></span>Pausada</span>`;

    const planLabel = c.plan === 'solo' ? 'Solo' : c.plan === 'clinica' ? 'Clínica' : c.plan;

    return `
      <div class="clinic-row" onclick="openClinicDetail('${c.id}')">
        <div>
          <div class="clinic-name">${c.nombre}</div>
          <div class="clinic-id">${c.id}</div>
        </div>
        <div>${statusBadge}</div>
        <div><span class="plan-tag">${planLabel}</span></div>
        <div>
          <div class="amount">RD$${c.mrr.toLocaleString()}</div>
          <div class="amount-sub">/ mes</div>
        </div>
        <div style="font-size:13px;color:var(--mid)">${c.pacientes.toLocaleString()} pac · ${c.ciudad}</div>
        <div class="row-actions" onclick="event.stopPropagation()">
          <button class="action-btn" title="Ver app" onclick="openApp('${c.id}')">↗</button>
          <button class="action-btn" title="Editar" onclick="openEditModal('${c.id}')">✎</button>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="clinics-table">
      <div class="table-header">
        <div>Clínica</div>
        <div>Estado</div>
        <div>Plan</div>
        <div>MRR</div>
        <div>Datos</div>
        <div></div>
      </div>
      ${rows}
    </div>`;
}

async function saveClinicEdit(id) {
  const nombre  = document.getElementById('edit-nombre').value.trim();
  const ciudad  = document.getElementById('edit-ciudad').value.trim();
  const plan    = document.getElementById('edit-plan').value;
  const email   = document.getElementById('edit-email').value.trim();
  const color   = document.getElementById('edit-color').value;
  const modulos = [...document.querySelectorAll('.modules-check-grid input:checked')].map(i => i.value);

  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({
        nombre, ciudad, plan, adminEmail: email, color, modulos,
        updatedAt: new Date().toISOString()
      }, { merge: true });

    closeModal();
    showToast('✓ Cambios guardados');
    await loadClinicas();
    showSection(currentSection);
  } catch(e) {
    showToast('❌ Error: ' + e.message);
  }
}

function updateMRRPreview() {
  const plan = document.getElementById('new-plan')?.value || 'clinica';
  const modulos = [...document.querySelectorAll('.modules-check-grid input:checked')].map(i => i.value);
  const mrr = calcMRR(plan, modulos, 1);
  const el = document.getElementById('new-mrr-preview');
  if (el) el.textContent = 'RD$' + mrr.toLocaleString();
}

function autoSlug(val) {
  const slug = val.toLowerCase()
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e')
    .replace(/[íìï]/g,'i').replace(/[óòö]/g,'o')
    .replace(/[úùü]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const el = document.getElementById('new-id');
  if (el) el.value = slug;
}

async function crearClinica() {
  const nombre = document.getElementById('new-nombre').value.trim();
  const id     = document.getElementById('new-id').value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
  const ciudad = document.getElementById('new-ciudad').value.trim();
  const plan   = document.getElementById('new-plan').value;
  const email  = document.getElementById('new-email').value.trim();
  const color  = document.getElementById('new-color').value;
  const modulos = [...document.querySelectorAll('.modules-check-grid input:checked')].map(i => i.value);

  if (!nombre || !id || !email) {
    showToast('⚠️ Nombre, ID y email son requeridos');
    return;
  }

  // Check if ID already exists
  const existing = await db.collection('clinicas').doc(id).get();
  if (existing.exists) {
    showToast('⚠️ Ya existe una clínica con ese ID');
    return;
  }

  try {
    // Create main document
    await db.collection('clinicas').doc(id).set({
      facturas: [], personal: getDefaultPersonal(nombre),
      gastos: [], avances: [], cuadresDiarios: {},
      citas: [], laboratorios: [], reversiones: [], auditLogs: [],
      pacientes: [], usaSubcollectionPacientes: true,
      lastUpdated: new Date().toISOString(),
      nombre, ciudad, plan, adminEmail: email, color, modulos
    });

    // Create config
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({
        nombre, clinicaId: id, ciudad, plan,
        adminEmail: email, color, modulos,
        activa: true, creadaEn: new Date().toISOString(),
        trialHasta: getTrial14Days()
      });

    showToast('✅ Clínica creada exitosamente');
    await loadClinicas();
    showSection('clinicas');
  } catch(e) {
    showToast('❌ Error: ' + e.message);
    console.error(e);
  }
}

function getDefaultPersonal(clinicNombre) {
  return [
    { id: '1', nombre: 'Administrador', tipo: 'regular', password: 'admin123', isAdmin: true, canAccessReception: true }
  ];
}

function getTrial14Days() {
  const d = new Date();
  d.setDate(d.getDate() + 14);
  return d.toISOString();
}

// ── ACTIONS ───────────────────────────────────────────
async function toggleStatus(id) {
  const c = clinicas.find(x => x.id === id);
  if (!c) return;
  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({ activa: !c.activa }, { merge: true });
    closeModal();
    showToast(c.activa ? '⏸ Clínica pausada' : '✅ Clínica reactivada');
    await loadClinicas();
    showSection(currentSection);
  } catch(e) { showToast('❌ ' + e.message); }
}

function openApp(id) {
  const url = `${window.location.origin}${window.location.pathname.replace('admin.html','')}app.html?clinica=${id}`;
  window.open(url, '_blank');
}





function copyToClipboard(text) {
  navigator.clipboard?.writeText(text).then(() => showToast('✓ Link copiado'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
