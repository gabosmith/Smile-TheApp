<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMILE — Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════
     SMILE ADMIN — Brand v3 Neumorphic Warm
  ══════════════════════════════════════════════ */
  :root {
    /* ── Paleta base — contraste corregido ── */
    --sand:     #EEEAE4;
    --sand-lt:  #F7F4EF;
    --white:    #FDFCFB;
    --topo:     #3D3830;
    --piedra:   #6B635C;
    --muted:    #9A9189;
    --carbon:   #2A2520;
    --terra:    #B5704F;
    --salvia:   #4d7053;
    --pizarra:  #5e7080;
    --rosa:     #EAC0B2;
    --red:      #A84848;
    --green:    #4d7053;

    /* ── Sombras neumórficas ── */
    --neu-raised:    8px 8px 20px rgba(168,159,150,.30), -6px -6px 16px rgba(255,255,255,.80);
    --neu-raised-lg: 14px 14px 34px rgba(168,159,150,.35), -10px -10px 26px rgba(255,255,255,.85);
    --neu-inset:     inset 4px 4px 10px rgba(168,159,150,.28), inset -3px -3px 8px rgba(255,255,255,.75);
    --neu-inset-lg:  inset 6px 6px 16px rgba(168,159,150,.32), inset -4px -4px 12px rgba(255,255,255,.80);
    --neu-flat:      3px 3px 8px rgba(168,159,150,.20), -2px -2px 6px rgba(255,255,255,.70);
    --neu-pizarra:   6px 6px 16px rgba(125,142,160,.35), -4px -4px 12px rgba(255,255,255,.70);
    --neu-terra:     6px 6px 16px rgba(196,133,106,.35), -4px -4px 12px rgba(255,255,255,.70);
    --neu-salvia:    6px 6px 16px rgba(107,143,113,.30), -4px -4px 12px rgba(255,255,255,.70);

    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 22px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 300;
    background: var(--sand);
    color: var(--topo);
    -webkit-font-smoothing: antialiased;
  }

  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(.97); } to { opacity: 1; transform: none; } }
  @keyframes pop     { from { opacity: 0; transform: scale(.85); } to { opacity: 1; transform: scale(1); } }

  /* ══ LOGIN ═══════════════════════════════════════ */
  .login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--sand); padding: 24px;
    position: relative; overflow: hidden;
  }
  .login-screen::before {
    content: ''; position: absolute; top: -20%; right: -10%;
    width: 50vw; height: 50vw; border-radius: 50%;
    background: rgba(255,255,255,.22); pointer-events: none;
  }
  .login-screen::after {
    content: ''; position: absolute; bottom: -15%; left: -10%;
    width: 44vw; height: 44vw; border-radius: 50%;
    background: rgba(255,255,255,.14); pointer-events: none;
  }

  .login-card {
    background: var(--sand); border-radius: var(--radius-lg);
    padding: 44px 36px; width: 100%; max-width: 380px;
    box-shadow: var(--neu-raised-lg); position: relative; z-index: 1;
  }
  .login-logo {
    font-size: 11px; font-weight: 600; letter-spacing: 7px;
    color: var(--topo); margin-bottom: 4px;
  }
  .login-sub {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--terra); margin-bottom: 36px;
  }
  .login-field { margin-bottom: 16px; }
  .login-field label {
    display: block; font-size: 9px; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--piedra); margin-bottom: 7px; font-weight: 600;
  }
  .login-field input {
    width: 100%; padding: 13px 16px;
    background: var(--sand); border: none;
    border-radius: var(--radius-sm); font-size: 14px;
    font-family: inherit; font-weight: 300; color: var(--topo);
    box-shadow: var(--neu-inset); outline: none; transition: box-shadow .2s;
  }
  .login-field input:focus { box-shadow: var(--neu-inset-lg), 0 0 0 2px rgba(125,142,160,.18); }
  .login-error { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }
  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(145deg, #8b9eb2, var(--pizarra));
    color: white; border: none; border-radius: var(--radius-sm);
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    font-family: inherit; cursor: pointer; margin-top: 8px;
    box-shadow: var(--neu-pizarra); transition: all .25s;
  }
  .login-btn:hover { background: linear-gradient(145deg, #cc9178, var(--terra)); box-shadow: var(--neu-terra); }
  .login-btn:active { transform: scale(.98); }

  /* ══ LAYOUT ═══════════════════════════════════════ */
  .app { display: none; min-height: 100vh; }
  .app.visible { display: flex; }

  /* ══ SIDEBAR ══════════════════════════════════════ */
  .sidebar {
    width: 230px; flex-shrink: 0;
    background: linear-gradient(180deg, #F0ECE5 0%, #E8E3DA 100%);
    min-height: 100vh; display: flex; flex-direction: column;
    padding: 32px 0; position: sticky; top: 0; height: 100vh;
    border-right: 1px solid rgba(255,255,255,.7);
    box-shadow: 4px 0 20px rgba(168,159,150,.12);
  }
  .sidebar-logo {
    font-size: 11px; font-weight: 600; letter-spacing: 7px;
    color: var(--topo); padding: 0 28px; margin-bottom: 3px;
  }
  .sidebar-role {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--terra); padding: 0 28px; margin-bottom: 36px;
  }
  .sidebar-nav { flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 28px; font-size: 13px; color: var(--piedra);
    cursor: pointer; transition: all .2s;
    border-left: 2px solid transparent;
  }
  .nav-item:hover { color: var(--topo); }
  .nav-item.active {
    color: var(--topo); font-weight: 400;
    border-left-color: var(--pizarra);
    background: rgba(125,142,160,.07);
  }
  .nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; }
  .sidebar-bottom {
    padding: 24px 28px 0;
    border-top: 1px solid rgba(168,159,150,.25);
    margin-top: 16px;
  }
  .sidebar-version { font-size: 10px; color: var(--piedra); letter-spacing: 1px; }
  .logout-btn {
    font-size: 12px; color: var(--piedra); background: none; border: none;
    font-family: inherit; cursor: pointer; padding: 8px 0;
    transition: color .2s; display: block; margin-top: 8px;
  }
  .logout-btn:hover { color: var(--red); }

  /* ══ MAIN ═════════════════════════════════════════ */
  .main { flex: 1; overflow-y: auto; padding: 40px 48px; background: var(--sand); }

  /* ══ PAGE HEADER ══════════════════════════════════ */
  .page-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 36px;
  }
  .page-title { font-size: 30px; font-weight: 200; letter-spacing: -1px; color: var(--topo); }
  .page-sub { font-size: 13px; color: var(--piedra); margin-top: 4px; }

  .header-btn {
    background: var(--sand); color: var(--topo); border: none;
    padding: 12px 24px; border-radius: 100px; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; font-family: inherit;
    cursor: pointer; box-shadow: var(--neu-raised); transition: all .2s;
  }
  .header-btn:hover { box-shadow: var(--neu-pizarra); color: var(--pizarra); }
  .header-btn.primary {
    background: linear-gradient(145deg, #8b9eb2, var(--pizarra));
    color: white; box-shadow: var(--neu-pizarra);
  }
  .header-btn.primary:hover { background: linear-gradient(145deg, #cc9178, var(--terra)); box-shadow: var(--neu-terra); }

  /* ══ TABS ═════════════════════════════════════════ */
  .tab-bar {
    display: flex; gap: 3px; margin-bottom: 28px;
    background: var(--sand); border-radius: 100px;
    padding: 4px; width: fit-content;
    box-shadow: var(--neu-inset);
  }
  .tab-btn {
    padding: 9px 20px; border-radius: 100px; font-size: 12px;
    color: var(--piedra); cursor: pointer; border: none;
    background: none; font-family: inherit; transition: all .2s;
  }
  .tab-btn.active { background: var(--sand); color: var(--topo); box-shadow: var(--neu-raised); }

  /* ══ STATS GRID ═══════════════════════════════════ */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--sand); border-radius: var(--radius-md); padding: 26px;
    box-shadow: var(--neu-raised); transition: box-shadow .2s, transform .2s;
  }
  .stat-card:hover { box-shadow: var(--neu-raised-lg); transform: translateY(-2px); }
  .stat-accent { width: 28px; height: 3px; border-radius: 2px; margin-bottom: 14px; }
  .stat-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--piedra); margin-bottom: 12px; }
  .stat-val { font-size: 32px; font-weight: 200; letter-spacing: -1px; color: var(--topo); margin-bottom: 6px; }
  .stat-sub { font-size: 11px; color: var(--piedra); }

  /* ══ CLINICS TABLE ════════════════════════════════ */
  .section-title { font-size: 16px; font-weight: 400; color: var(--topo); margin-bottom: 16px; }

  .clinics-table {
    background: var(--sand); border-radius: var(--radius-lg);
    overflow: hidden; box-shadow: var(--neu-raised-lg); margin-bottom: 28px;
  }
  .table-header {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 80px;
    padding: 14px 24px; font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--piedra);
    border-bottom: 1px solid rgba(255,255,255,.8);
  }
  .clinic-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 80px;
    padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,.6);
    align-items: center; transition: background .15s; cursor: pointer;
  }
  .clinic-row:last-child { border-bottom: none; }
  .clinic-row:hover { background: rgba(255,255,255,.5); }

  .clinic-name { font-size: 14px; font-weight: 400; color: var(--topo); }
  .clinic-id   { font-size: 10px; color: var(--piedra); margin-top: 2px; letter-spacing: 1px; font-family: monospace; }

  /* ══ BADGES ═══════════════════════════════════════ */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 11px; border-radius: 100px; font-size: 11px; font-weight: 400;
  }
  .badge-active { background: rgba(107,143,113,.12); color: var(--salvia); }
  .badge-trial  { background: rgba(196,133,106,.12); color: var(--terra); }
  .badge-paused { background: rgba(196,112,112,.12); color: var(--red); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .plan-tag {
    font-size: 10px; color: var(--piedra); background: var(--sand);
    padding: 4px 10px; border-radius: 6px; box-shadow: var(--neu-flat);
  }

  .amount { font-size: 14px; font-weight: 400; color: var(--topo); }
  .amount-sub { font-size: 10px; color: var(--piedra); }

  .row-actions { display: flex; gap: 6px; }
  .action-btn {
    width: 30px; height: 30px; border-radius: 9px; border: none;
    background: var(--sand); font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--neu-flat); color: var(--piedra); transition: all .2s;
  }
  .action-btn:hover { box-shadow: var(--neu-terra); color: var(--terra); }

  /* ══ EMPTY / LOADING ══════════════════════════════ */
  .empty-state { text-align: center; padding: 60px 32px; color: var(--piedra); }
  .empty-icon  { font-size: 36px; margin-bottom: 14px; }
  .empty-title { font-size: 17px; font-weight: 300; margin-bottom: 6px; color: var(--topo); }
  .empty-sub   { font-size: 13px; }
  .loading-row { padding: 48px; text-align: center; color: var(--piedra); font-size: 12px; letter-spacing: 2px; }

  /* ══ MODAL ════════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(107,99,92,.38); backdrop-filter: blur(8px);
    z-index: 1000; display: none; align-items: center;
    justify-content: center; padding: 40px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--sand); border-radius: var(--radius-lg);
    width: 100%; max-width: 560px; max-height: 84vh; overflow-y: auto;
    box-shadow: var(--neu-raised-lg); animation: modalIn .3s cubic-bezier(.34,1.2,.64,1);
  }
  .modal-header {
    padding: 30px 30px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-title { font-size: 22px; font-weight: 200; letter-spacing: -.5px; color: var(--topo); }
  .modal-close {
    background: var(--sand); border: none; width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; color: var(--piedra);
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--neu-flat); transition: all .2s;
  }
  .modal-close:hover { box-shadow: var(--neu-terra); color: var(--terra); }
  .modal-body { padding: 22px 30px 30px; }

  .modal-field { margin-bottom: 18px; }
  .modal-field label {
    display: block; font-size: 9px; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--piedra); margin-bottom: 7px; font-weight: 600;
  }
  .modal-field input, .modal-field select {
    width: 100%; padding: 13px 16px; background: var(--sand);
    border: none; border-radius: var(--radius-sm); font-size: 14px;
    font-family: inherit; font-weight: 300; color: var(--topo);
    box-shadow: var(--neu-inset); outline: none; transition: box-shadow .2s;
    -webkit-appearance: none;
  }
  .modal-field input:focus, .modal-field select:focus {
    box-shadow: var(--neu-inset-lg), 0 0 0 2px rgba(125,142,160,.18);
  }
  .modal-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modules-check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .module-check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--sand);
    border-radius: var(--radius-sm); cursor: pointer;
    transition: box-shadow .15s; font-size: 13px; color: var(--piedra);
    box-shadow: var(--neu-flat);
  }
  .module-check-item:hover { box-shadow: var(--neu-raised); color: var(--topo); }
  .module-check-item.checked { box-shadow: var(--neu-pizarra); color: var(--topo); }
  .module-check-item input[type="checkbox"] { accent-color: var(--pizarra); }

  .modal-actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .modal-action-btn {
    padding: 12px 14px; background: var(--sand); border: none;
    border-radius: var(--radius-sm); color: var(--piedra); font-family: inherit;
    font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    box-shadow: var(--neu-flat); transition: all .2s;
  }
  .modal-action-btn:hover { box-shadow: var(--neu-raised); color: var(--topo); }
  .modal-action-btn span { font-size: 14px; }
  .modal-action-btn.btn-danger  { color: var(--red); }
  .modal-action-btn.btn-danger:hover  { box-shadow: 4px 4px 12px rgba(196,112,112,.3), -3px -3px 8px rgba(255,255,255,.7); }
  .modal-action-btn.btn-success { color: var(--salvia); }
  .modal-action-btn.btn-success:hover { box-shadow: var(--neu-salvia); }

  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .btn-cancel {
    padding: 11px 22px; background: var(--sand); border: none;
    border-radius: 100px; font-size: 12px; font-family: inherit;
    color: var(--piedra); cursor: pointer; box-shadow: var(--neu-flat); transition: all .2s;
  }
  .btn-cancel:hover { box-shadow: var(--neu-raised); color: var(--topo); }
  .btn-save {
    padding: 11px 24px;
    background: linear-gradient(145deg, #8b9eb2, var(--pizarra));
    color: white; border: none; border-radius: 100px;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    font-family: inherit; cursor: pointer;
    box-shadow: var(--neu-pizarra); transition: all .2s;
  }
  .btn-save:hover { background: linear-gradient(145deg, #cc9178, var(--terra)); box-shadow: var(--neu-terra); }

  /* ══ DETAIL VIEW ══════════════════════════════════ */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .detail-card { background: var(--sand); border-radius: var(--radius-sm); padding: 16px 18px; box-shadow: var(--neu-inset); }
  .detail-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--piedra); margin-bottom: 5px; font-weight: 600; }
  .detail-val   { font-size: 15px; color: var(--topo); font-weight: 400; }

  .link-card {
    background: var(--sand); border-radius: var(--radius-sm); padding: 18px 22px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; cursor: pointer; box-shadow: var(--neu-raised);
    transition: box-shadow .2s;
  }
  .link-card:hover { box-shadow: var(--neu-pizarra); }
  .link-url  { font-size: 13px; color: var(--pizarra); letter-spacing: .5px; font-family: monospace; }
  .link-copy { font-size: 10px; color: var(--piedra); }

  /* ══ COUNT PILL ═══════════════════════════════════ */
  .count-pill {
    display: inline-flex; align-items: center;
    background: var(--sand); border-radius: 100px;
    padding: 3px 11px; font-size: 11px; color: var(--piedra);
    margin-left: 9px; vertical-align: middle;
    box-shadow: var(--neu-flat);
  }

  /* ══ TOAST ════════════════════════════════════════ */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--carbon); color: var(--sand-lt);
    padding: 12px 22px; border-radius: 100px; font-size: 13px;
    box-shadow: var(--neu-raised-lg); opacity: 0;
    transform: translateY(8px); transition: all .3s;
    pointer-events: none; z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ══ ERROR LOG ════════════════════════════════════ */
  .error-log-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .error-card {
    background: var(--sand); border-radius: var(--radius-md);
    padding: 20px 22px; cursor: pointer;
    box-shadow: var(--neu-raised); transition: box-shadow .15s;
  }
  .error-card:hover    { box-shadow: var(--neu-raised-lg); }
  .error-card.expanded { box-shadow: var(--neu-raised-lg); }

  .error-card-severity {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 600; letter-spacing: .8px;
    text-transform: uppercase; padding: 4px 10px; border-radius: 100px; margin-bottom: 8px;
  }
  .sev-critico { background: rgba(196,112,112,.12); color: var(--red); }
  .sev-error   { background: rgba(196,133,106,.12); color: var(--terra); }
  .sev-aviso   { background: rgba(196,181,106,.12); color: #8a6f00; }
  .sev-info    { background: rgba(125,142,160,.12); color: var(--pizarra); }

  .error-title { font-size: 14px; font-weight: 500; color: var(--topo); margin-bottom: 4px; }
  .error-meta  { font-size: 11px; color: var(--piedra); }
  .error-detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.8); }
  .error-detail.open { display: block; }

  .error-section-title {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--piedra); margin-bottom: 8px;
  }
  .error-explanation { font-size: 13px; color: var(--topo); line-height: 1.7; margin-bottom: 14px; }

  .fix-steps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .fix-step {
    display: flex; align-items: flex-start; gap: 12px;
    background: rgba(255,255,255,.6); border-radius: var(--radius-sm);
    padding: 11px 14px;
  }
  .fix-step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(145deg, #8b9eb2, var(--pizarra));
    color: white; font-size: 10px; font-weight: 700; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .fix-step-text { font-size: 13px; color: var(--topo); line-height: 1.5; }
  .fix-step-text b { font-weight: 500; }

  .error-raw {
    background: var(--carbon); color: #a0e0a0; font-family: monospace;
    font-size: 11px; padding: 12px 16px; border-radius: var(--radius-sm);
    overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    max-height: 120px; overflow-y: auto;
  }
  .error-log-empty { text-align: center; padding: 72px 20px; color: var(--piedra); }

  .error-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .filter-pill {
    padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 400;
    border: none; background: var(--sand); color: var(--piedra);

  }
  .filter-pill.active { box-shadow: var(--neu-pizarra); color: var(--pizarra); font-weight: 500; }
  .filter-pill:hover  { box-shadow: var(--neu-raised); color: var(--topo); }

  .resolve-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 500;

  .resolve-btn.resolved   { background: var(--sand); color: var(--salvia); }
  .resolve-btn.unresolved { background: var(--sand); color: var(--pizarra); }
  .resolve-btn:hover      { box-shadow: var(--neu-raised); }

  .section { animation: fadeIn .3s ease; }
</style>
</head>
<body>

          font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;min-width:18px;text-align:center"></span>

    <div class="modal-body" id="modalBody"></div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── FIREBASE ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyB5l8pl4jzcJAvPahEu4w0Ay1PyFwvCgnk",
  authDomain: "smile-theapp.firebaseapp.com",
  projectId: "smile-theapp",
  storageBucket: "smile-theapp.firebasestorage.app",
  messagingSenderId: "723824118344",
  appId: "1:723824118344:web:aea955f3258d212343e67d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── AUTH ──────────────────────────────────────────────
// Credenciales hardcoded de admin SMILE (tú solo)
// Cuando quieras cambiarlas, cámbialas aquí
const ADMIN_CREDS = { user: 'gabo', password: '4498' };

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (email === ADMIN_CREDS.user && pass === ADMIN_CREDS.password) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    initApp();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPass').value = '';
}

// ── STATE ─────────────────────────────────────────────
let clinicas = [];
let currentSection = 'overview';

// ── INIT ──────────────────────────────────────────────
async function initApp() {
  // Show loading in main area
  document.getElementById('main').innerHTML = `
    <div style="padding:80px;text-align:center;color:var(--piedra)">
      <div style="font-size:32px;margin-bottom:16px;animation:spin 1s linear infinite;display:inline-block">⏳</div>
      <div style="font-size:13px;letter-spacing:2px">Conectando a Firebase...</div>
    </div>`;

  try {
    const auth = firebase.auth();
    if (!auth.currentUser) await auth.signInAnonymously();
    console.log('[Admin] Firebase auth OK — UID:', firebase.auth().currentUser?.uid);
  } catch(e) {
    console.warn('[Admin] Firebase auth warning:', e.message);
    showToast('⚠️ Auth: ' + e.message, 5000, '#c0392b');
  }
  await loadClinicas();
  showSection('overview');
  actualizarErrorBadge();
}

// Add spin keyframe if not present
const _spinStyle = document.createElement('style');
_spinStyle.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(_spinStyle);

async function recargarAdmin() {
  const btn = document.querySelector('[onclick="recargarAdmin()"]');
  if (btn) { btn.textContent = '↻ Cargando...'; btn.disabled = true; }
  await loadClinicas();
  showSection(currentSection);
  if (btn) { btn.textContent = '↻ Actualizar'; btn.disabled = false; }
}

async function loadClinicas() {
  try {
    const snap = await db.collection('clinicas').get();
    clinicas = await Promise.all(snap.docs.map(async doc => {
      const data = doc.data();
      // Load config sub-doc if exists
      let config = {};
      try {
        const cfgDoc = await db.collection('clinicas').doc(doc.id)
          .collection('config').doc('settings').get();
        if (cfgDoc.exists) config = cfgDoc.data();
      } catch(e) {}

      // Count patients
      let pacientes = 0;
      try {
        const pacSnap = await db.collection('clinicas').doc(doc.id)
          .collection('pacientes').get();
        pacientes = pacSnap.size;
      } catch(e) {
        pacientes = (data.pacientes || []).length;
      }

      return {
        id: doc.id,
        nombre: config.nombre || data.nombre || doc.id,
        ciudad: config.ciudad || data.ciudad || '—',
        color: config.color || '#C4856A',
        plan: config.plan || 'clinica',
        modulos: config.modulos || [],
        activa: config.activa !== false,
        exonerada: config.exonerada === true,
        suspendida: config.suspendida === true,
        pagoPendiente: config.pagoPendiente === true,
        subscripcionActiva: config.subscripcionActiva === true,
        gracePeriodHasta: config.gracePeriodHasta || null,
        proximoPago: config.proximoPago || null,
        trial: config.trialHasta ? new Date(config.trialHasta) > new Date() : false,
        trialHasta: config.trialHasta || null,
        adminEmail: config.adminEmail || '—',
        clinicaPadre: config.clinicaPadre || null,
        esSedePrincipal: config.esSedePrincipal || false,
        nombreSede: config.nombreSede || null,
        creadaEn: config.creadaEn || data.lastUpdated || null,
        migratedAt: data.migratedAt || null,
        pacientes,
        facturas: (data.facturas || []).length,
        citas: (data.citas || []).length,
        personalCount: (data.personal || []).length,
        // Calculate MRR from plan + modules
        mrr: calcMRR(config.plan, config.modulos, config.usuariosExtra || 0),
        waName:  config.contactoWA?.nombre || config.waName  || data.waName  || '',
        waCargo: config.contactoWA?.cargo  || config.waCargo || data.waCargo || '',
        waPhone: config.contactoWA?.phone  || config.waPhone || data.waPhone || '',
        lastLogin: data.lastLogin || config.lastLogin || data.lastUpdated || null,
        raw: { config: config, ...data },
        config,
      };
    }));
  } catch(e) {
    console.error('[Admin] Error loading clinicas:', e);
    clinicas = [];
    const main = document.getElementById('main');
    if (main) {
      main.innerHTML = `
        <div style="padding:60px;text-align:center;color:var(--piedra)">
          <div style="font-size:36px;margin-bottom:16px">🔥</div>
          <div style="font-size:17px;font-weight:300;color:var(--topo);margin-bottom:8px">Error conectando a Firebase</div>
          <div style="font-size:13px;margin-bottom:20px">${e.code || e.message}</div>
          <button onclick="recargarAdmin()" style="padding:12px 24px;background:var(--sand);
            border:none;border-radius:100px;font-family:inherit;font-size:12px;
            letter-spacing:2px;text-transform:uppercase;cursor:pointer;
            box-shadow:var(--neu-raised)">↻ Reintentar</button>
        </div>`;
    }
  }
}

function calcMRR(plan, modulos = [], usuariosExtra = 0) {
  const BASE = { clinica: 23, solo: 19 };
  const MODULE_PRICES = { laboratorio: 5, nomina: 5, inventario: 5, reportes: 5, multisucursal: 15 };
  const base       = BASE[plan] || 23;
  const modCost    = (modulos || []).reduce((s, m) => s + (MODULE_PRICES[m] || 0), 0);
  const usersCost  = Math.max(0, usuariosExtra || 0) * 2.5;
  return base + modCost + usersCost;
}

function fmtMRR(c) {
  return '$' + (c.mrr || 0).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' USD';
}

// ── SECTIONS ──────────────────────────────────────────
async function showSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector(`.nav-item[data-section="${section}"]`);
  if (navEl) navEl.classList.add('active');

  const main = document.getElementById('main');
  if (section === 'overview') renderOverview(main);
  else if (section === 'clinicas') renderClinicas(main);
  else if (section === 'nueva') { renderNuevaClinica(main); setTimeout(cargarNotifsOnboarding, 100); }
  else if (section === 'contactos') renderContactos(main);
  else if (section === 'errores') await renderErrorLog(main);

}


// ── CONTACTOS ─────────────────────────────────────────
function renderContactos(main) {
  const filtro = window._contactosFiltro || 'todos';
  const busqueda = (window._contactosBusqueda || '').toLowerCase().trim();

  let lista = clinicas.filter(c => {
    if (filtro === 'activas')     return c.activa && !c.trial && !c.suspendida && !c.pagoPendiente;
    if (filtro === 'trial')       return c.trial;
    if (filtro === 'pausadas')    return !c.activa;
    if (filtro === 'suspendidas') return c.suspendida || c.pagoPendiente;
    return true;
  });

  if (busqueda) {
    lista = lista.filter(c =>
      c.nombre.toLowerCase().includes(busqueda) ||
      c.id.toLowerCase().includes(busqueda) ||
      (c.waName || '').toLowerCase().includes(busqueda) ||
      (c.waPhone || '').includes(busqueda) ||
      (c.adminEmail || '').toLowerCase().includes(busqueda)
    );
  }

  lista.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));

  const filterBtns = ['todos','activas','trial','pausadas','suspendidas'].map(f => `
    <button onclick="window._contactosFiltro='${f}';showSection('contactos')" style="
      padding:6px 14px;border:none;border-radius:100px;font-size:12px;font-family:inherit;
      cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;
      background:${filtro===f ? 'var(--topo)' : 'transparent'};
      color:${filtro===f ? 'var(--sand-lt)' : f==='suspendidas' ? '#e65100' : 'var(--piedra)'};">
      ${f === 'suspendidas' ? '⚠ Pagos' : f.charAt(0).toUpperCase()+f.slice(1)}
    </button>`).join('');

  const cards = lista.map(c => {
    const statusColor = c.trial ? '#C4856A'
      : !c.activa ? '#999'
      : c.raw?.config?.suspendida ? '#c0392b'
      : c.raw?.config?.pagoPendiente ? '#e67e22'
      : '#3a9e5f';
    const statusLabel = c.trial ? 'Trial'
      : !c.activa ? 'Pausada'
      : c.raw?.config?.suspendida ? 'Suspendida'
      : c.raw?.config?.pagoPendiente ? 'Pago pendiente'
      : 'Activa';
    const waLink = c.waPhone
      ? `https://wa.me/1${c.waPhone.replace(/[^0-9]/g,'')}`
      : null;
    const trialDias = c.trialHasta
      ? Math.max(0, Math.ceil((new Date(c.trialHasta) - new Date()) / (1000*60*60*24)))
      : null;
    const lastLoginStr = c.lastLogin
      ? new Date(c.lastLogin).toLocaleDateString('es-DO', {day:'numeric',month:'short',year:'numeric'})
      : '—';
    const modulosStr = c.modulos.length
      ? c.modulos.map(m => m.charAt(0).toUpperCase()+m.slice(1)).join(' · ')
      : 'Base';

    return `
    <div style="background:var(--sand);border-radius:16px;padding:20px 24px;
                border:1.5px solid rgba(168,159,150,.12);margin-bottom:10px;
                display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <div style="font-size:15px;font-weight:400;color:var(--topo)">${c.nombre}</div>
          <span style="padding:3px 10px;border-radius:100px;font-size:10px;letter-spacing:1px;
                       background:${statusColor}18;color:${statusColor}">${statusLabel}</span>
          ${c.trial && trialDias !== null ? `<span style="font-size:11px;color:var(--piedra)">${trialDias}d restantes</span>` : ''}
        </div>
        <div style="font-size:12px;color:var(--piedra);margin-bottom:4px">
          ${c.waName ? `<strong style="color:var(--topo)">${c.waName}</strong>${c.waCargo ? ' · ' + c.waCargo : ''}` : '<span style="color:var(--muted)">Sin contacto WA</span>'}
        </div>
        <div style="font-size:12px;color:var(--piedra);margin-bottom:8px">
          ${c.waPhone ? c.waPhone : ''}
          ${c.adminEmail !== '—' ? ` · ${c.adminEmail}` : ''}
        </div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--piedra)">
          <span>📦 ${c.plan === 'solo' ? 'Solo' : 'Clínica'}</span>
          <span>💰 ${fmtMRR(c)}/mes</span>
          <span>🧩 ${modulosStr}</span>
          <span>🕐 ${lastLoginStr}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        ${waLink ? `<a href="${waLink}" target="_blank" style="
          padding:8px 16px;background:#25D366;color:white;border-radius:100px;
          text-decoration:none;font-size:12px;font-family:inherit;
          display:flex;align-items:center;gap:6px;white-space:nowrap">
          💬 WhatsApp
        </a>` : '<span style="font-size:11px;color:var(--piedra);opacity:0.5">Sin WA</span>'}
        <button onclick="openClinicDetail('${c.id}')" style="
          padding:8px 16px;background:transparent;color:var(--piedra);
          border:none;border-radius:100px;box-shadow:var(--neu-flat);
          font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;
          transition:all 0.15s"
          onmouseover="this.style.borderColor='var(--terra)';this.style.color='var(--terra)'"
          onmouseout="this.style.borderColor='rgba(168,159,150,.25)';this.style.color='var(--piedra)'">
          Ver clínica →
        </button>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Contactos</div>
          <div class="page-sub">${lista.length} clínica${lista.length !== 1 ? 's' : ''} · Actualizado en tiempo real</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="text" placeholder="Buscar clínica, contacto..." value="${window._contactosBusqueda || ''}"
            oninput="window._contactosBusqueda=this.value;
                     document.getElementById('contactos-lista').innerHTML=renderContactosCards();"
            style="padding:8px 16px;border:1.5px solid rgba(168,159,150,.2);border-radius:100px;
                   font-size:13px;font-family:inherit;background:var(--sand-lt);color:var(--topo);
                   outline:none;width:220px"
            onfocus="this.style.borderColor='var(--terra)'"
            onblur="this.style.borderColor='rgba(168,159,150,.2)'">
          <div style="display:flex;gap:4px;background:var(--sand-lt);
                      border-radius:100px;padding:4px;border:1.5px solid rgba(168,159,150,.12)">
            ${filterBtns}
          </div>
        </div>
      </div>

      <div id="contactos-lista">
        ${lista.length === 0 ? `
          <div style="text-align:center;padding:60px 20px;color:var(--piedra)">
            <div style="font-size:32px;margin-bottom:12px">📋</div>
            <div>No hay clínicas en este filtro</div>
          </div>` : cards}
      </div>
    </div>
  `;
}

// ── OVERVIEW ──────────────────────────────────────────
function renderOverview(main) {
  const activas        = clinicas.filter(c => c.activa && !c.trial && !c.suspendida && !c.pagoPendiente);
  const trials         = clinicas.filter(c => c.trial);
  const conPago        = clinicas.filter(c => c.pagoPendiente || c.suspendida);
  const mrr            = activas.reduce((s, c) => s + c.mrr, 0);
  const totalPacientes = clinicas.reduce((s, c) => s + c.pacientes, 0);

  const alertasPago = conPago.length > 0 ? `
    <div style="background:rgba(230,81,0,.08);border:1.5px solid rgba(230,81,0,.2);border-radius:14px;
                padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px">
      <div>
        <div style="font-size:13px;font-weight:500;color:#e65100;margin-bottom:4px">
          ⚠ ${conPago.length} clínica${conPago.length !== 1 ? 's' : ''} con problemas de pago
        </div>
        <div style="font-size:12px;color:var(--piedra);line-height:1.6">
          ${conPago.map(c => `<strong>${c.nombre}</strong> — ${c.suspendida ? 'Suspendida' : 'Pago pendiente'}`).join('<br>')}
        </div>
      </div>
      <button onclick="showSection('clinicas')"
        style="padding:8px 18px;background:#e65100;color:white;border:none;border-radius:100px;
               font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0">
        Ver clínicas →
      </button>
    </div>` : '';

  main.innerHTML = `
    <div class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Overview</div>
          <div class="page-sub">Estado actual de SMILE.app</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="header-btn" onclick="recargarAdmin()" style="background:none;box-shadow:var(--neu-flat);border:none;color:var(--piedra)" title="Actualizar datos">↻ Actualizar</button>
          <button class="header-btn" onclick="showSection('nueva')">+ Nueva clínica</button>
        </div>
      </div>

      ${alertasPago}

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--terra)"></div>
          <div class="stat-label">MRR</div>
          <div class="stat-val">${fmtMRR({mrr})}</div>
          <div class="stat-sub">${activas.length} activas · ${trials.length} en trial</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--pizarra)"></div>
          <div class="stat-label">Clínicas totales</div>
          <div class="stat-val">${clinicas.length}</div>
          <div class="stat-sub">${trials.length} en trial · ${conPago.length > 0 ? `<span style="color:#e65100">${conPago.length} con alerta</span>` : 'sin alertas'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--green)"></div>
          <div class="stat-label">Pacientes totales</div>
          <div class="stat-val">${totalPacientes.toLocaleString()}</div>
          <div class="stat-sub">En todas las clínicas</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--rosa)"></div>
          <div class="stat-label">ARR proyectado</div>
          <div class="stat-val">${fmtMRR({mrr: mrr * 12})}</div>
          <div class="stat-sub">Solo clínicas activas</div>
        </div>
      </div>

      <div class="section-title">Todas las clínicas <span class="count-pill">${clinicas.length}</span></div>
      ${renderClinicsTable(clinicas)}
    </div>
  `;
}

// ── CLÍNICAS ──────────────────────────────────────────
function renderClinicas(main) {
  main.innerHTML = `
    <div class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Clínicas <span class="count-pill">${clinicas.length}</span></div>
          <div class="page-sub">Todas las clínicas registradas en SMILE.app</div>
        </div>
        <button class="header-btn" onclick="showSection('nueva')">+ Nueva clínica</button>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="filterClinicas('todas', this)">Todas</button>
        <button class="tab-btn" onclick="filterClinicas('activas', this)">Activas</button>
        <button class="tab-btn" onclick="filterClinicas('trial', this)">Trial</button>
        <button class="tab-btn" onclick="filterClinicas('pago', this)" style="color:#e65100">⚠ Pago</button>
        <button class="tab-btn" onclick="filterClinicas('pausadas', this)">Pausadas</button>
      </div>

      <div id="clinicasTableWrap">
        ${renderClinicsTable(clinicas)}
      </div>
    </div>
  `;
}

function filterClinicas(filter, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let list = clinicas;
  if (filter === 'activas')  list = clinicas.filter(c => c.activa && !c.trial && !c.suspendida && !c.pagoPendiente);
  if (filter === 'trial')    list = clinicas.filter(c => c.trial);
  if (filter === 'pago')     list = clinicas.filter(c => c.pagoPendiente || c.suspendida);
  if (filter === 'pausadas') list = clinicas.filter(c => !c.activa);
  document.getElementById('clinicasTableWrap').innerHTML = renderClinicsTable(list);
}

function renderClinicsTable(list) {
  if (list.length === 0) {
    return `<div class="clinics-table">
      <div class="empty-state">
        <div class="empty-icon">🏥</div>
        <div class="empty-title">Sin clínicas registradas</div>
        <div class="empty-sub">Agrega tu primera clínica para comenzar</div>
      </div>
    </div>`;
  }

  const rows = list.map(c => {
    const statusBadge = c.suspendida
      ? `<span class="badge" style="background:rgba(192,57,43,.12);color:#c0392b"><span class="badge-dot" style="background:#c0392b"></span>Suspendida</span>`
      : c.pagoPendiente
        ? `<span class="badge" style="background:rgba(230,81,0,.12);color:#e65100"><span class="badge-dot" style="background:#e65100"></span>Pago pend.</span>`
        : c.trial
          ? `<span class="badge badge-trial"><span class="badge-dot"></span>Trial</span>`
          : c.activa
            ? `<span class="badge badge-active"><span class="badge-dot"></span>Activa</span>`
            : `<span class="badge badge-paused"><span class="badge-dot"></span>Pausada</span>`;

    const planLabel = c.plan === 'solo' ? 'Solo' : c.plan === 'clinica' ? 'Clínica' : c.plan;
    const trialDias = c.trial && c.trialHasta
      ? Math.max(0, Math.ceil((new Date(c.trialHasta) - new Date()) / 86400000))
      : null;

    return `
      <div class="clinic-row" onclick="openClinicDetail('${c.id}')">
        <div>
          <div class="clinic-name">${c.nombre}</div>
          <div class="clinic-id">${c.id}${trialDias !== null ? ` · ${trialDias}d trial` : ''}</div>
        </div>
        <div>${statusBadge}</div>
        <div><span class="plan-tag">${planLabel}</span></div>
        <div>
          <div class="amount">${fmtMRR(c)}</div>
          <div class="amount-sub">/ mes</div>
        </div>
        <div style="font-size:12px;color:var(--piedra)">${c.pacientes.toLocaleString()} pac · ${c.ciudad}</div>
        <div class="row-actions" onclick="event.stopPropagation()">
          <button class="action-btn" title="Ver app" onclick="openApp('${c.id}')">↗</button>
          <button class="action-btn" title="Editar" onclick="openEditModal('${c.id}')">✎</button>
          <button class="action-btn" title="${c.activa ? 'Pausar' : 'Reactivar'}"
                  style="color:${c.activa ? 'var(--red)' : 'var(--salvia)'}"
                  onclick="toggleStatus('${c.id}')">${c.activa ? '⏸' : '▶'}</button>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="clinics-table">
      <div class="table-header">
        <div>Clínica</div>
        <div>Estado</div>
        <div>Plan</div>
        <div>MRR</div>
        <div>Datos</div>
        <div></div>
      </div>
      ${rows}
    </div>`;
}

  if (!c) return;

  const allModulos = [
    { key: 'laboratorio',   label: 'Laboratorio',         price: 9 },
    { key: 'nomina',        label: 'Nómina',              price: 9 },
    { key: 'inventario',    label: 'Inventario',          price: 9 },
    { key: 'reportes',      label: 'Reportes avanzados',  price: 9 },
    { key: 'multisucursal', label: 'Sucursal adicional',  price: 19 },
  ];

  document.getElementById('modalTitle').textContent = 'Editar — ' + c.nombre;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-field">
      <label>Nombre de la clínica</label>
      <input type="text" id="edit-nombre" value="${c.nombre}">
    </div>
    <div class="modal-field-row">
      <div class="modal-field">
        <label>Ciudad</label>
        <input type="text" id="edit-ciudad" value="${c.ciudad === '—' ? '' : c.ciudad}">
      </div>
      <div class="modal-field">
        <label>Plan</label>
        <select id="edit-plan">
          <option value="solo" ${c.plan==='solo'?'selected':''}>Solo — $29 USD/mes</option>
          <option value="clinica" ${c.plan==='clinica'?'selected':''}>Clínica — $49 USD/mes</option>
        </select>
      </div>
    </div>
    <div class="modal-field">
      <label>Email del admin</label>
      <input type="email" id="edit-email" value="${c.adminEmail === '—' ? '' : c.adminEmail}">
    </div>
    <div class="modal-field">
      <label>Color de la clínica</label>
      <input type="color" id="edit-color" value="${c.color}" style="height:48px;border-radius:12px;width:100%">
    </div>
    <div class="modal-field">
      <label>Módulos activos</label>
      <div class="modules-check-grid">
        ${allModulos.map(m => `
          <label class="module-check-item ${c.modulos.includes(m.key) ? 'checked' : ''}">
            <input type="checkbox" value="${m.key}" ${c.modulos.includes(m.key) ? 'checked' : ''}
              onchange="this.closest('.module-check-item').classList.toggle('checked', this.checked)">
            ${m.label} <span style="margin-left:auto;font-size:11px;color:var(--muted)">+${m.price}</span>
          </label>
        `).join('')}
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveClinicEdit('${c.id}')">Guardar cambios</button>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

async function saveClinicEdit(id) {
  const nombre  = document.getElementById('edit-nombre').value.trim();
  const ciudad  = document.getElementById('edit-ciudad').value.trim();
  const plan    = document.getElementById('edit-plan').value;
  const email   = document.getElementById('edit-email').value.trim();
  const color   = document.getElementById('edit-color').value;
  const modulos = [...document.querySelectorAll('.modules-check-grid input:checked')].map(i => i.value);

  const mrr = calcMRR(plan, modulos);
  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({
        nombre, ciudad, plan, adminEmail: email, color, modulos, mrr,
        updatedAt: new Date().toISOString()
      }, { merge: true });

    closeModal();
    showToast('✓ Cambios guardados');
    await loadClinicas();
    openClinicDetail(id); // reabrir con datos frescos
  } catch(e) {
    showToast('❌ Error: ' + e.message);
  }
}

}

function autoSlug(val) {
  const slug = val.toLowerCase()
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e')
    .replace(/[íìï]/g,'i').replace(/[óòö]/g,'o')
    .replace(/[úùü]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const el = document.getElementById('new-id');
  if (el) el.value = slug;
}

async function crearClinica() {
  const nombre      = document.getElementById('new-nombre').value.trim();
  const id          = document.getElementById('new-id').value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
  const ciudad      = document.getElementById('new-ciudad').value.trim();
  const plan        = document.getElementById('new-plan').value;
  const email       = document.getElementById('new-email').value.trim();
  const adminNombre = document.getElementById('new-admin-nombre').value.trim() || 'Administrador';
  const color       = document.getElementById('new-color').value;
  const modulos     = [...document.querySelectorAll('.modules-check-grid input:checked')].map(i => i.value);
  const pais        = document.getElementById('new-pais')?.value || 'República Dominicana';
  const waPhone     = document.getElementById('new-waphone')?.value.replace(/[^0-9]/g,'') || '';
  // Map country to dial code for WhatsApp
  const DIAL = { 'República Dominicana':'+1','USA':'+1','Colombia':'+57','México':'+52',
    'Panamá':'+507','Costa Rica':'+506','Guatemala':'+502','Honduras':'+504',
    'El Salvador':'+503','Venezuela':'+58','Ecuador':'+593','Perú':'+51',
    'Chile':'+56','Argentina':'+54','España':'+34' };
  const dialCode  = DIAL[pais] || '+1';
  const waFull    = waPhone ? dialCode + waPhone : '';

  if (!nombre || !id || !email) {
    showToast('⚠️ Nombre, ID y email son requeridos');
    return;
  }

  const btn = document.querySelector('[onclick="crearClinica()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Creando...'; }

  try {
    // Check if ID already exists
    const existing = await db.collection('clinicas').doc(id).get();
    if (existing.exists) {
      showToast('⚠️ Ya existe una clínica con ese ID');
      if (btn) { btn.disabled = false; btn.textContent = '🏥 Crear clínica'; }
      return;
    }

    // Generate a 4-digit PIN and hash it with the clinic ID as salt
    const pinPlain = String(Math.floor(1000 + Math.random() * 9000));
    const pinHash  = await adminHashPin(id, pinPlain);
    const personal = [{
      id: '1',
      nombre: adminNombre,
      tipo: 'regular',
      password: pinHash,
      _pwHashed: true,
      isAdmin: true,
      canAccessReception: true,
      email: email,
    }];

    // Create main document
    await db.collection('clinicas').doc(id).set({
      facturas: [], personal,
      gastos: [], avances: [], cuadresDiarios: {},
      citas: [], laboratorios: [], reversiones: [], auditLogs: [],
      pacientes: [], usaSubcollectionPacientes: true,
      lastUpdated: new Date().toISOString(),
    });

    // Create config/settings
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({
        nombre, clinicaId: id, ciudad, plan,
        adminEmail: email, color, modulos,
        activa: true, trial: true,
        creadaEn: new Date().toISOString(),
        trialHasta: getTrial14Days(),
        mrr: calcMRR(plan, modulos),
      });

    // Save notification with PIN (plain) so admin can send credentials later
    await db.collection('smile_notifications').add({
      tipo: 'nueva_clinica',
      clinicaId: id,
      nombre,
      adminNombre,
      plan,
      adminEmail: email,
      mrr: calcMRR(plan, modulos),
      pin: pinPlain,
      pais,
      waPhone: waFull,
      moneda: 'USD',
      fecha: new Date().toISOString(),
      origenRegistro: 'admin',
      leida: false,
    }).catch(() => {}); // non-blocking

    // Show success modal with PIN + credential sharing buttons
    showToast('✅ Clínica creada — PIN: ' + pinPlain, 6000);
    setTimeout(() => {
      mostrarModalCredenciales(nombre, adminNombre, id, pinPlain, email, waFull);
    }, 400);

    await loadClinicas();
    // Stay on nueva section so admin can see the onboarding panel refresh
    await cargarNotifsOnboarding();
  } catch(e) {
    showToast('❌ Error: ' + e.message);
    console.error(e);
    if (btn) { btn.disabled = false; btn.textContent = '🏥 Crear clínica'; }
  }
}

// SHA-256 hash matching app.js verifyPassword logic
// salt = clinicId (same as CLINIC_PATH in app.js)
async function adminSha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function adminHashPin(clinicId, pin) {
  return adminSha256(clinicId + ':' + pin);
}

function getTrial14Days() {
  const d = new Date();
  d.setDate(d.getDate() + 14);
  return d.toISOString();
}

function openResetPassword(id) {
  const c = clinicas.find(x => x.id === id);
  if (!c) return;
  const newPass      = String(Math.floor(1000 + Math.random() * 9000));
  const adminNombre  = c.raw?.personal?.find(p => p.isAdmin)?.nombre
                    || c.raw?.personal?.[0]?.nombre
                    || 'Administrador';

  document.getElementById('modalTitle').textContent = '🔑 Reset PIN — ' + c.nombre;
  document.getElementById('modalBody').innerHTML = `

        <div style="font-size:12px;color:var(--piedra);margin-top:12px">Usuario: <strong>${adminNombre}</strong></div>
      </div>
      <div style="font-size:12px;color:var(--muted)">Se guarda en Firebase al confirmar.</div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="confirmResetPassword('${id}','${newPass}')">Confirmar y guardar</button>
    </div>
  `;
}

async function confirmResetPassword(id, newPass) {
  try {
    const pinHash = await adminHashPin(id, newPass);
    const doc     = await db.collection('clinicas').doc(id).get();
    const pers    = doc.data()?.personal || [];
    const updated = pers.length
      ? pers.map((p,i) => (p.isAdmin || i===0) ? {...p, password: pinHash, _pwHashed: true} : p)
      : [{ id:'1', nombre:'Administrador', isAdmin:true, password:pinHash, _pwHashed:true, canAccessReception:true }];
    await db.collection('clinicas').doc(id).update({ personal: updated });
    closeModal();
    showToast('✅ PIN reseteado: ' + newPass);
    await loadClinicas();
  } catch(e) { showToast('❌ ' + e.message); }
}

// ── EXTENDER TRIAL ────────────────────────────────────
function extendTrial(id) {
  const c   = clinicas.find(x => x.id === id);
  if (!c) return;
  const base = c.trialHasta
    ? new Date(Math.max(new Date(c.trialHasta), new Date()))
    : new Date();
  const d7   = new Date(base); d7.setDate(d7.getDate()+7);
  const d14  = new Date(base); d14.setDate(d14.getDate()+14);
  const d30  = new Date(base); d30.setDate(d30.getDate()+30);
  const fmt  = d => d.toLocaleDateString('es-DO',{day:'numeric',month:'long',year:'numeric'});
  const btn  = (days, date) => `
    <button onclick="confirmExtendTrial('${id}','${date.toISOString()}')"
      style="padding:16px 20px;background:var(--sand);border:1.5px solid rgba(168,159,150,.14);
             border-radius:12px;color:var(--topo);font-family:inherit;font-size:14px;
             cursor:pointer;text-align:left;width:100%;transition:background 0.2s,border-color 0.2s"
      onmouseover="this.style.boxShadow='var(--neu-terra)';this.style.color='var(--terra)'"
      onmouseout="this.style.background='var(--sand)';this.style.borderColor='rgba(168,159,150,.14)'">
      <span style="color:var(--terra);font-weight:500">+${days} días</span>
      <span style="color:var(--piedra);font-size:12px;float:right">hasta ${fmt(date)}</span>
    </button>`;

  document.getElementById('modalTitle').textContent = '📅 Extender trial — ' + c.nombre;
  document.getElementById('modalBody').innerHTML = `
    <div style="padding:8px 0 4px">
      <div style="font-size:13px;color:var(--piedra);margin-bottom:20px">
        Trial actual: <strong style="color:${c.trial?'var(--terra)':'#999'}">${c.trialHasta ? fmt(new Date(c.trialHasta)) : 'Vencido'}</strong>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${btn(7,d7)}${btn(14,d14)}${btn(30,d30)}
      </div>
    </div>
    <div class="modal-footer" style="margin-top:20px">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  `;
}

async function confirmExtendTrial(id, newDate) {
  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').update({
        trial: true,
        trialHasta: newDate,
        trialExtendidoEn: new Date().toISOString()
      });
    closeModal();
    showToast('✅ Trial extendido hasta '
      + new Date(newDate).toLocaleDateString('es-DO',{day:'numeric',month:'long'}));
    await loadClinicas();
    showSection(currentSection);
  } catch(e) { showToast('❌ ' + e.message); }
}

async function guardarNotasInternas(id) {
  const el = document.getElementById('notas-' + id);
  if (!el) return;
  const nota = el.value.trim();
  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings')
      .set({ notasInternas: nota, notasActualizadasEn: new Date().toISOString() }, { merge: true });
    showToast('✓ Nota guardada');
    // Update local cache too
    const c = clinicas.find(x => x.id === id);
    if (c && c.raw?.config) c.raw.config.notasInternas = nota;
  } catch(e) { showToast('❌ ' + e.message); }
}

function copyToClipboard(text) {
  navigator.clipboard?.writeText(text).then(() => showToast('✓ Link copiado'));
}

function showToast(msg, duration = 3000, bg = null) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  if (bg) t.style.background = bg; else t.style.background = '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

document.addEventListener('keydown', e => {

function getSeveridadLabel(sev) {
  const labels = { critico: '🔴 Crítico', error: '🟠 Error', aviso: '🟡 Aviso', info: '🔵 Info' };
  return labels[sev] || '⚪ Desconocido';
}

function formatErrorTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-DO', { day: 'numeric', month: 'short', year: 'numeric' }) +
         ' · ' + d.toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit' });
}

// SMILE SENTINEL — Torre de control
// ════════════════════════════════════════════════════════════

let _sentinelData   = { health: {}, errors: [], lastRefresh: null };
let _sentinelTab    = 'pulso';
let _errLogs        = [];
let _currentFeedList= [];
let _currentErrTipo = 'todos';

// ── Cargar datos de salud (smile_health) ────────────────────
async function _loadHealth() {
  const health = {};
  try {
    const snap = await db.collection('smile_health').get();
    snap.docs.forEach(d => { health[d.id] = d.data(); });
  } catch(e) { /* colección vacía — clínicas sin telemetría */ }
  _sentinelData.health = health;
  return health;
}

// ── Cargar errores (smile_errors + auditLogs legacy) ────────
async function cargarErrorLogs() {
  const errores = [];
  try {
    const snap = await db.collection('smile_errors')
      .orderBy('fecha', 'desc').limit(300).get();
    snap.docs.forEach(d => errores.push({ ...d.data(), _docId: d.id }));
  } catch(e) {}

  for (const clinica of clinicas) {
    try {
      const doc = await db.collection('clinicas').doc(clinica.id).get();
      if (!doc.exists) continue;
      const logs = doc.data().auditLogs || [];
      logs.filter(l => l.tipo === 'error' || l.error || l.codigo).forEach(l => {
        const dup = errores.find(e =>
          e.clinicaId === clinica.id && e.fecha === l.fecha && (e.codigoError || e.codigo) === (l.codigo || l.codigoError));
        if (!dup) errores.push({ ...l, _docId: null,
          clinicaId: clinica.id, clinicaNombre: clinica.nombre || clinica.id,
          codigoError: l.codigo || l.codigoError || 'DEFAULT' });
      });
    } catch(e) {}
  }

  errores.forEach(e => {
    if (!e.clinicaNombre) {
      const c = clinicas.find(x => x.id === e.clinicaId);
      e.clinicaNombre = c?.nombre || e.clinicaId || 'Sin clínica';
    }
  });
  errores.sort((a, b) => new Date(b.fecha||0) - new Date(a.fecha||0));
  _errLogs = errores;
  _sentinelData.errors = errores;
  _sentinelData.lastRefresh = new Date();
  return errores;
}

// ── Estado de salud por clínica ─────────────────────────────
function _clinicaEstado(clinica) {
  const h      = _sentinelData.health[clinica.id];
  const errs   = _errLogs.filter(e => e.clinicaId === clinica.id && !e.resuelto && !e._resuelto);
  const criticos = errs.filter(e => e.severidad === 'critico').length;
  if (!clinica.activa && !clinica.trial)  return { sem: 'gris',    label: 'Inactiva',            desc: 'Suscripción pausada' };
  if (criticos > 0)                        return { sem: 'rojo',    label: 'Errores críticos',    desc: `${criticos} sin resolver` };
  if (!h)                                  return { sem: 'gris',    label: 'Sin telemetría',      desc: 'No ha enviado señal aún' };
  const min = h.lastSeen ? Math.floor((Date.now()-new Date(h.lastSeen))/60000) : 999;
  if (min > 60*24) return { sem: 'gris',    label: 'Sin actividad',       desc: `Última señal hace ${Math.floor(min/1440)}d` };
  if (min > 30)    return { sem: 'amarillo', label: 'Inactiva',            desc: `Sin actividad hace ${min}m` };
  if (errs.length) return { sem: 'amarillo', label: 'Con avisos',          desc: `${errs.length} evento${errs.length>1?'s':''} pendiente${errs.length>1?'s':''}` };
  return               { sem: 'verde',    label: 'Saludable',           desc: `Activa · hace ${min < 2 ? 'ahora' : min+'m'}` };
}

        <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0">
          <div style="width:10px;height:10px;border-radius:50%;background:${DOTS[est.sem]};flex-shrink:0;

            <div style="font-size:11px;color:var(--muted);margin-top:1px">${c.id} · ${fmtMRR(c)}/mes</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;flex-shrink:0">
          ${h ? `
            <div style="text-align:right">
              <div style="font-size:12px;font-weight:500;color:var(--topo)">${h.usuario||'—'}</div>
              <div style="font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase">usuario</div>

// ── Tab: Feed de errores ─────────────────────────────────────
function _renderFeed(soloResueltos) {
  const body = document.getElementById('sentinelBody');
  if (!body) return;
  let lista = _errLogs.filter(e => soloResueltos ? (e.resuelto||e._resuelto) : !(e.resuelto||e._resuelto));

  if (!lista.length) {
    body.innerHTML = `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:36px;margin-bottom:12px">${soloResueltos?'📭':'🎉'}</div>
      <div style="font-size:15px;font-weight:300;color:var(--topo)">${soloResueltos?'Sin errores resueltos aún':'¡Todo limpio! Sin errores abiertos'}</div>
    </div>`;
    return;
  }

  const counts = t => t==='js' ? lista.filter(e=>e.codigoError==='js-runtime-error'||e.codigoError==='promise-rejected').length
    : t==='critico' ? lista.filter(e=>e.severidad==='critico').length
    : t==='error'   ? lista.filter(e=>e.severidad==='error').length
    : t==='aviso'   ? lista.filter(e=>e.severidad==='aviso').length : lista.length;

  body.innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap" id="errSubFiltros">
      <button class="filter-pill active" onclick="_setErrTipo('todos',this)">Todos (${counts('todos')})</button>
      <button class="filter-pill" onclick="_setErrTipo('critico',this)">🔴 Crítico (${counts('critico')})</button>
      <button class="filter-pill" onclick="_setErrTipo('js',this)">🐛 JS oculto (${counts('js')})</button>
      <button class="filter-pill" onclick="_setErrTipo('error',this)">🟠 Error (${counts('error')})</button>
      <button class="filter-pill" onclick="_setErrTipo('aviso',this)">🟡 Aviso (${counts('aviso')})</button>
    </div>
    <div id="errFeedList">${_buildFeedCards(lista)}</div>`;
  _currentFeedList = lista;
}

function _setErrTipo(tipo, btn) {
  document.querySelectorAll('#errSubFiltros .filter-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  let lista = _currentFeedList;
  if (tipo==='critico') lista=lista.filter(e=>e.severidad==='critico');
  else if (tipo==='js') lista=lista.filter(e=>e.codigoError==='js-runtime-error'||e.codigoError==='promise-rejected');
  else if (tipo!=='todos') lista=lista.filter(e=>e.severidad===tipo);
  document.getElementById('errFeedList').innerHTML=_buildFeedCards(lista);
}

function _buildFeedCards(lista) {
  const SEV_COL = {critico:'var(--red)',error:'var(--terra)',aviso:'#8a6f00',info:'var(--pizarra)'};
  const SEV_BG  = {critico:'rgba(196,112,112,.1)',error:'rgba(196,133,106,.1)',aviso:'rgba(196,181,106,.08)',info:'rgba(125,142,160,.08)'};
  const SEV_ICO = {critico:'🔴',error:'🟠',aviso:'🟡',info:'🔵'};

  return lista.slice(0,100).map((err,i) => {
    const uid   = err._docId||('err-'+i);
    const sev   = err.severidad||'error';
    const isJS  = err.codigoError==='js-runtime-error'||err.codigoError==='promise-rejected';
    const kb    = ERROR_KB[err.codigoError]||ERROR_KB[err.codigo]||ERROR_KB['DEFAULT'];
    const titulo= err.titulo||kb?.titulo||err.codigoError||'Error sin clasificar';
    const res   = err.resuelto||err._resuelto;

    return `
    <div id="ecard-${uid}" onclick="_toggleEC('${uid}')" style="cursor:pointer;
         background:var(--sand);border:1.5px solid rgba(168,159,150,.12);border-radius:16px;
         padding:16px 18px;margin-bottom:8px;${res?'opacity:0.5':''}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
            <span style="background:${SEV_BG[sev]};color:${SEV_COL[sev]};border-radius:100px;
                         padding:2px 9px;font-size:10px;font-weight:600">${SEV_ICO[sev]} ${sev.toUpperCase()}</span>
            ${isJS?'<span style="background:rgba(196,133,106,.15);color:var(--terra);border-radius:100px;padding:2px 9px;font-size:10px;font-weight:600">🐛 JS OCULTO</span>':''}
            <span style="background:rgba(168,159,150,.1);color:var(--piedra);border-radius:100px;
                         padding:2px 9px;font-size:10px;font-family:monospace">${err.codigoError||'—'}</span>
          </div>
          <div style="font-size:13px;font-weight:500;color:var(--topo);margin-bottom:4px">${titulo}</div>
          <div style="font-size:11px;color:var(--piedra);display:flex;gap:10px;flex-wrap:wrap">
            <span>🏥 ${err.clinicaNombre||err.clinicaId||'—'}</span>
            <span>🕐 ${_formatRelTime(err.fecha)}</span>
            <span>👤 ${err.usuario||'Sistema'}</span>
            ${err.version?`<span>📦 v${err.version}</span>`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <button id="rbtn-${uid}" onclick="_toggleRes('${uid}',event)"
            style="padding:6px 12px;border-radius:100px;border:1.5px solid;font-size:11px;font-family:inherit;
                   cursor:pointer;transition:all .15s;
                   ${res?'background:rgba(107,143,113,.1);border-color:rgba(107,143,113,.3);color:var(--salvia)'
                        :'background:transparent;border-color:rgba(168,159,150,.3);color:var(--piedra)'}">
            ${res?'✓ Resuelto':'Resolver'}
          </button>
          <span id="chev-${uid}" style="color:var(--muted);font-size:16px;transition:transform .2s">›</span>
        </div>
      </div>
      <div id="edet-${uid}" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid rgba(168,159,150,.12)">
        ${err.detalle?`<div style="background:rgba(0,0,0,.03);border-radius:10px;padding:10px 12px;
          font-size:12px;color:var(--topo);margin-bottom:10px;word-break:break-word">${err.detalle}</div>`:''}
        ${err.stack?`<div style="background:rgba(30,30,30,.04);border-radius:10px;padding:10px 12px;
          font-family:monospace;font-size:11px;color:var(--carbon);white-space:pre-wrap;word-break:break-word;
          margin-bottom:10px;overflow-x:auto">${(err.stack||'').replace(/</g,'&lt;')}</div>`:''}
        ${err.url?`<div style="font-size:11px;color:var(--muted);margin-bottom:10px">🔗 <code>${err.url}</code></div>`:''}
        ${(kb?.pasos||[]).length?`
          <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
                      margin-bottom:8px;font-weight:600">Cómo resolverlo</div>
          ${(kb?.pasos||[]).map((p,n)=>`
            <div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start">
              <div style="width:18px;height:18px;border-radius:50%;background:var(--terra);color:white;
                          font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;
                          flex-shrink:0">${n+1}</div>
              <div style="font-size:12px;color:var(--topo)"><b>${p.accion}</b> — ${p.detalle}</div>
            </div>`).join('')}`:''}
      </div>
    </div>`;
  }).join('') + (lista.length>100?`<div style="text-align:center;padding:20px;font-size:12px;color:var(--muted)">Mostrando 100 de ${lista.length}</div>`:'');
}

function _toggleEC(uid) {
  const d=document.getElementById('edet-'+uid), ch=document.getElementById('chev-'+uid);
  if(!d) return;
  const open=d.style.display==='block';
  d.style.display=open?'none':'block';
  if(ch) ch.style.transform=open?'':'rotate(90deg)';
}

function _toggleRes(uid, event) {
  event.stopPropagation();
  const btn=document.getElementById('rbtn-'+uid);
  const idx=_errLogs.findIndex(e=>e._docId===uid||('err-'+_errLogs.indexOf(e))===uid);
  if(idx<0) return;
  const res=!(_errLogs[idx].resuelto||_errLogs[idx]._resuelto);
  _errLogs[idx]._resuelto=res;
  if(btn){
    btn.textContent=res?'✓ Resuelto':'Resolver';
    btn.style.background=res?'rgba(107,143,113,.1)':'transparent';
    btn.style.borderColor=res?'rgba(107,143,113,.3)':'rgba(168,159,150,.3)';
    btn.style.color=res?'var(--salvia)':'var(--piedra)';
  }
  const card=document.getElementById('ecard-'+uid);
  if(card) card.style.opacity=res?'0.5':'1';
  if(_errLogs[idx]._docId)
    db.collection('smile_errors').doc(_errLogs[idx]._docId)
      .update({resuelto:res, resueltoEn:res?new Date().toISOString():null}).catch(()=>{});
  _actualizarIconoNav();
}

// ── Tab switcher ─────────────────────────────────────────────
function setSentinelTab(tab, btn) {
  _sentinelTab=tab;
  document.querySelectorAll('#sentinelTabs .filter-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(tab==='pulso')     _renderPulso();
  if(tab==='errores')   _renderFeed(false);
  if(tab==='resueltos') _renderFeed(true);
}

// ── Reload completo ──────────────────────────────────────────
async function recargarSentinel() {
  const bar=document.getElementById('sentinelStatusBar');
  const body=document.getElementById('sentinelBody');
  if(bar)  bar.innerHTML='<div style="text-align:center;padding:20px;color:var(--piedra)">↻ Actualizando...</div>';
  if(body) body.innerHTML='';
  await Promise.all([cargarErrorLogs(),_loadHealth()]).catch(()=>{});
  _renderStatusBar();
  if(_sentinelTab==='pulso')     _renderPulso();
  if(_sentinelTab==='errores')   _renderFeed(false);
  if(_sentinelTab==='resueltos') _renderFeed(true);
  _actualizarIconoNav();
}

// ── Badge e ícono del nav ────────────────────────────────────
function _actualizarIconoNav() {
  const abiertos=_errLogs.filter(e=>!e.resuelto&&!e._resuelto).length;
  const criticos=_errLogs.filter(e=>!e.resuelto&&!e._resuelto&&e.severidad==='critico').length;
  const icon=document.getElementById('sentinelNavIcon');
  const badge=document.getElementById('errorBadge');
  if(icon) icon.textContent=criticos>0?'🔴':abiertos>0?'🟡':'🟢';
  if(badge){
    if(abiertos>0){badge.textContent=abiertos>9?'9+':abiertos;badge.style.display='inline-block';}
    else badge.style.display='none';
  }
}

async function actualizarErrorBadge() {
  try {
    let count=0;
    try{const s=await db.collection('smile_errors').where('resuelto','==',false).limit(99).get();count=s.size;}catch(e){}
    const badge=document.getElementById('errorBadge');
    const icon=document.getElementById('sentinelNavIcon');
    if(badge){if(count>0){badge.textContent=count>9?'9+':count;badge.style.display='inline-block';}else badge.style.display='none';}
    if(icon) icon.textContent=count>0?'🟡':'🟢';
  } catch(e){console.warn('[Sentinel]',e.message);}
}

function _formatRelTime(iso) {
  if(!iso) return '—';
  const min=Math.floor((Date.now()-new Date(iso))/60000);
  if(min<2)   return 'ahora';
  if(min<60)  return `hace ${min}m`;
  const h=Math.floor(min/60);
  if(h<24)    return `hace ${h}h`;
  return `hace ${Math.floor(h/24)}d`;
}

// Legacy aliases
function recargarErrorLog(){recargarSentinel();}
function setErrFiltro(f,btn){setSentinelTab(f==='resueltos'?'resueltos':'errores',btn);}

</script>
