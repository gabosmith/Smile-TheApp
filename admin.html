<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMILE — Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════
     SMILE ADMIN — Brand v3 Neumorphic Warm
  ══════════════════════════════════════════════ */
  :root {
    /* ── Paleta base ── */
    --sand:     #EEEAE4;
    --sand-lt:  #F7F4EF;
    --white:    #FDFCFB;
    --topo:     var(--muted);
    --piedra:   #A89F96;
    --muted:    #C8C2BB;
    --carbon:   #3A3532;
    --terra:    #C4856A;
    --salvia:   #6B8F71;
    --pizarra:  #7D8EA0;
    --rosa:     #EAC0B2;
    --red:      #C47070;
    --green:    #6B8F71;

    /* ── Sombras neumórficas ── */
    --neu-raised:    8px 8px 20px rgba(168,159,150,.30), -6px -6px 16px rgba(255,255,255,.80);
    --neu-raised-lg: 14px 14px 34px rgba(168,159,150,.35), -10px -10px 26px rgba(255,255,255,.85);
    --neu-inset:     inset 4px 4px 10px rgba(168,159,150,.28), inset -3px -3px 8px rgba(255,255,255,.75);
    --neu-inset-lg:  inset 6px 6px 16px rgba(168,159,150,.32), inset -4px -4px 12px rgba(255,255,255,.80);
    --neu-flat:      3px 3px 8px rgba(168,159,150,.20), -2px -2px 6px rgba(255,255,255,.70);
    --neu-pizarra:   6px 6px 16px rgba(125,142,160,.35), -4px -4px 12px rgba(255,255,255,.70);
    --neu-terra:     6px 6px 16px rgba(196,133,106,.35), -4px -4px 12px rgba(255,255,255,.70);
    --neu-salvia:    6px 6px 16px rgba(107,143,113,.30), -4px -4px 12px rgba(255,255,255,.70);

    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 22px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 300;
    background: var(--sand);
    color: var(--topo);
    -webkit-font-smoothing: antialiased;
  }

  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(.97); } to { opacity: 1; transform: none; } }
  @keyframes pop     { from { opacity: 0; transform: scale(.85); } to { opacity: 1; transform: scale(1); } }

  /* ══ LOGIN ═══════════════════════════════════════ */
  .login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--sand); padding: 24px;
    position: relative; overflow: hidden;
  }
  .login-screen::before {
    content: ''; position: absolute; top: -20%; right: -10%;
    width: 50vw; height: 50vw; border-radius: 50%;
    background: rgba(255,255,255,.22); pointer-events: none;
  }
  .login-screen::after {
    content: ''; position: absolute; bottom: -15%; left: -10%;
    width: 44vw; height: 44vw; border-radius: 50%;
    background: rgba(255,255,255,.14); pointer-events: none;
  }

  .login-card {
    background: var(--sand); border-radius: var(--radius-lg);
    padding: 44px 36px; width: 100%; max-width: 380px;
    box-shadow: var(--neu-raised-lg); position: relative; z-index: 1;
  }
  .login-logo {
    font-size: 11px; font-weight: 600; letter-spacing: 7px;
    color: var(--topo); margin-bottom: 4px;
  }
  .login-sub {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--terra); margin-bottom: 36px;
  }
  .login-field { margin-bottom: 16px; }
  .login-field label {
    display: block; font-size: 9px; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--piedra); margin-bottom: 7px; font-weight: 600;
  }
  .login-field input {
    width: 100%; padding: 13px 16px;
    background: var(--sand); border: none;
    border-radius: var(--radius-sm); font-size: 14px;
    font-family: inherit; font-weight: 300; color: var(--topo);
    box-shadow: var(--neu-inset); outline: none; transition: box-shadow .2s;
  }
  .login-field input:focus { box-shadow: var(--neu-inset-lg), 0 0 0 2px rgba(125,142,160,.18); }
  .login-error { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }
  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(145deg, #8b9eb2, var(--pizarra));
    color: white; border: none; border-radius: var(--radius-sm);
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    font-family: inherit; cursor: pointer; margin-top: 8px;
    box-shadow: var(--neu-pizarra); transition: all .25s;
  }
  .login-btn:hover { background: linear-gradient(145deg, #cc9178, var(--terra)); box-shadow: var(--neu-terra); }
  .login-btn:active { transform: scale(.98); }

  /* ══ LAYOUT ═══════════════════════════════════════ */
  .app { display: none; min-height: 100vh; }
  .app.visible { display: flex; }

  /* ══ SIDEBAR ══════════════════════════════════════ */
  .sidebar {
    width: 230px; flex-shrink: 0;
    background: linear-gradient(180deg, #F0ECE5 0%, #E8E3DA 100%);
    min-height: 100vh; display: flex; flex-direction: column;
    padding: 32px 0; position: sticky; top: 0; height: 100vh;
    border-right: 1px solid rgba(255,255,255,.7);
    box-shadow: 4px 0 20px rgba(168,159,150,.12);
  }
  .sidebar-logo {
    font-size: 11px; font-weight: 600; letter-spacing: 7px;
    color: var(--topo); padding: 0 28px; margin-bottom: 3px;
  }
  .sidebar-role {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--terra); padding: 0 28px; margin-bottom: 36px;
  }
  .sidebar-nav { flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 28px; font-size: 13px; color: var(--muted);
    cursor: pointer; transition: all .2s;
    border-left: 2px solid transparent;
  }
  .nav-item:hover { color: var(--topo); }
  .nav-item.active {
    color: var(--topo); font-weight: 400;
    border-left-color: var(--pizarra);
    background: rgba(125,142,160,.07);
  }
  .nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; }
  .sidebar-bottom {
    padding: 24px 28px 0;
    border-top: 1px solid rgba(168,159,150,.25);
    margin-top: 16px;
  }
  .sidebar-version { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .logout-btn {
    font-size: 12px; color: var(--piedra); background: none; border: none;
    font-family: inherit; cursor: pointer; padding: 8px 0;
    transition: color .2s; display: block; margin-top: 8px;
  }
  .logout-btn:hover { color: var(--red); }

  /* ══ MAIN ═════════════════════════════════════════ */
  .main { flex: 1; overflow-y: auto; padding: 40px 48px; background: var(--sand); }

  /* ══ PAGE HEADER ══════════════════════════════════ */
  .page-header {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 36px;
  }
  .page-title { font-size: 30px; font-weight: 200; letter-spacing: -1px; color: var(--topo); }
  .page-sub { font-size: 13px; color: var(--piedra); margin-top: 4px; }

  .header-btn {
    background: var(--sand); color: var(--topo); border: none;
    padding: 12px 24px; border-radius: 100px; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; font-family: inherit;
    cursor: pointer; box-shadow: var(--neu-raised); transition: all .2s;
  }
  .header-btn:hover { box-shadow: var(--neu-pizarra); color: var(--pizarra); }
  .header-btn.primary {
    background: linear-gradient(145deg, #8b9eb2, var(--pizarra));
    color: white; box-shadow: var(--neu-pizarra);
  }
  .header-btn.primary:hover { background: linear-gradient(145deg, #cc9178, var(--terra)); box-shadow: var(--neu-terra); }

  /* ══ TABS ═════════════════════════════════════════ */
  .tab-bar {
    display: flex; gap: 3px; margin-bottom: 28px;
    background: var(--sand); border-radius: 100px;
    padding: 4px; width: fit-content;
    box-shadow: var(--neu-inset);
  }
  .tab-btn {
    padding: 9px 20px; border-radius: 100px; font-size: 12px;
    color: var(--muted); cursor: pointer; border: none;
    background: none; font-family: inherit; transition: all .2s;
  }
  .tab-btn.active { background: var(--sand); color: var(--topo); box-shadow: var(--neu-raised); }

  /* ══ STATS GRID ═══════════════════════════════════ */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px; margin-bottom: 28px;
  }
  .stat-card {
    background: var(--sand); border-radius: var(--radius-md); padding: 26px;
    box-shadow: var(--neu-raised); transition: box-shadow .2s, transform .2s;
  }
  .stat-card:hover { box-shadow: var(--neu-raised-lg); transform: translateY(-2px); }
  .stat-accent { width: 28px; height: 3px; border-radius: 2px; margin-bottom: 14px; }
  .stat-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .stat-val { font-size: 32px; font-weight: 200; letter-spacing: -1px; color: var(--topo); margin-bottom: 6px; }
  .stat-sub { font-size: 11px; color: var(--piedra); }

  /* ══ CLINICS TABLE ════════════════════════════════ */
  .section-title { font-size: 16px; font-weight: 400; color: var(--topo); margin-bottom: 16px; }

  .clinics-table {
    background: var(--sand); border-radius: var(--radius-lg);
    overflow: hidden; box-shadow: var(--neu-raised-lg); margin-bottom: 28px;
  }
  .table-header {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 80px;
    padding: 14px 24px; font-size: 9px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid rgba(255,255,255,.8);
  }
  .clinic-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 80px;
    padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,.6);
    align-items: center; transition: background .15s; cursor: pointer;
  }
  .clinic-row:last-child { border-bottom: none; }
  .clinic-row:hover { background: rgba(255,255,255,.5); }

  .clinic-name { font-size: 14px; font-weight: 400; color: var(--topo); }
  .clinic-id   { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 1px; font-family: monospace; }

  /* ══ BADGES ═══════════════════════════════════════ */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 11px; border-radius: 100px; font-size: 11px; font-weight: 400;
  }
  .badge-active { background: rgba(107,143,113,.12); color: var(--salvia); }
  .badge-trial  { background: rgba(196,133,106,.12); color: var(--terra); }
  .badge-paused { background: rgba(196,112,112,.12); color: var(--red); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .plan-tag {
    font-size: 10px; color: var(--piedra); background: var(--sand);
    padding: 4px 10px; border-radius: 6px; box-shadow: var(--neu-flat);
  }

  .amount { font-size: 14px; font-weight: 400; color: var(--topo); }
  .amount-sub { font-size: 10px; color: var(--piedra); }

  .row-actions { display: flex; gap: 6px; }
  .action-btn {
    width: 30px; height: 30px; border-radius: 9px; border: none;
    background: var(--sand); font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--neu-flat); color: var(--piedra); transition: all .2s;
  }
  .action-btn:hover { box-shadow: var(--neu-terra); color: var(--terra); }

  /* ══ EMPTY / LOADING ══════════════════════════════ */
  .empty-state { text-align: center; padding: 60px 32px; color: var(--piedra); }
  .empty-icon  { font-size: 36px; margin-bottom: 14px; }
  .empty-title { font-size: 17px; font-weight: 300; margin-bottom: 6px; color: var(--topo); }
  .empty-sub   { font-size: 13px; }
  .loading-row { padding: 48px; text-align: center; color: var(--muted); font-size: 12px; letter-spacing: 2px; }

  /* ══ MODAL ════════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(107,99,92,.38); backdrop-filter: blur(8px);
    z-index: 1000; display: none; align-items: center;
    justify-content: center; padding: 40px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--sand); border-radius: var(--radius-lg);
    width: 100%; max-width: 560px; max-height: 84vh; overflow-y: auto;
    box-shadow: var(--neu-raised-lg); animation: modalIn .3s cubic-bezier(.34,1.2,.64,1);
  }
  .modal-header {
    padding: 30px 30px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .modal-title { font-size: 22px; font-weight: 200; letter-spacing: -.5px; color: var(--topo); }
  .modal-close {
    background: var(--sand); border: none; width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; color: var(--piedra);
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--neu-flat); transition: all .2s;
  }
  .modal-close:hover { box-shadow: var(--neu-terra); color: var(--terra); }
  .modal-body { padding: 22px 30px 30px; }

  .modal-field { margin-bottom: 18px; }
  .modal-field label {
    display: block; font-size: 9px; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--piedra); margin-bottom: 7px; font-weight: 600;
  }
  .modal-field input, .modal-field select {
    width: 100%; padding: 13px 16px; background: var(--sand);
    border: none; border-radius: var(--radius-sm); font-size: 14px;
    font-family: inherit; font-weight: 300; color: var(--topo);
    box-shadow: var(--neu-inset); outline: none; transition: box-shadow .2s;
    -webkit-appearance: none;
  }
  .modal-field input:focus, .modal-field select:focus {
    box-shadow: var(--neu-inset-lg), 0 0 0 2px rgba(125,142,160,.18);
  }
  .modal-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modules-check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .module-check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--sand);
    border-radius: var(--radius-sm); cursor: pointer;
    transition: box-shadow .15s; font-size: 13px; color: var(--piedra);
    box-shadow: var(--neu-flat);
  }
  .module-check-item:hover { box-shadow: var(--neu-raised); color: var(--topo); }
  .module-check-item.checked { box-shadow: var(--neu-pizarra); color: var(--topo); }
  .module-check-item input[type="checkbox"] { accent-color: var(--pizarra); }

  .modal-actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .modal-action-btn {
    padding: 12px 14px; background: var(--sand); border: none;
    border-radius: var(--radius-sm); color: var(--piedra); font-family: inherit;
    font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
    box-shadow: var(--neu-flat); transition: all .2s;
  }
  .modal-action-btn:hover { box-shadow: var(--neu-raised); color: var(--topo); }
  .modal-action-btn span { font-size: 14px; }
  .modal-action-btn.btn-danger  { color: var(--red); }
  .modal-action-btn.btn-danger:hover  { box-shadow: 4px 4px 12px rgba(196,112,112,.3), -3px -3px 8px rgba(255,255,255,.7); }
  .modal-action-btn.btn-success { color: var(--salvia); }
  .modal-action-btn.btn-success:hover { box-shadow: var(--neu-salvia); }

  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .btn-cancel {
    padding: 11px 22px; background: var(--sand); border: none;
    border-radius: 100px; font-size: 12px; font-family: inherit;
    color: var(--piedra); cursor: pointer; box-shadow: var(--neu-flat); transition: all .2s;
  }
  .btn-cancel:hover { box-shadow: var(--neu-raised); color: var(--topo); }
  .btn-save {
    padding: 11px 24px;
    background: linear-gradient(145deg, #8b9eb2, var(--pizarra));
    color: white; border: none; border-radius: 100px;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    font-family: inherit; cursor: pointer;
    box-shadow: var(--neu-pizarra); transition: all .2s;
  }
  .btn-save:hover { background: linear-gradient(145deg, #cc9178, var(--terra)); box-shadow: var(--neu-terra); }

  /* ══ DETAIL VIEW ══════════════════════════════════ */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .detail-card { background: var(--sand); border-radius: var(--radius-sm); padding: 16px 18px; box-shadow: var(--neu-inset); }
  .detail-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .detail-val   { font-size: 15px; color: var(--topo); font-weight: 400; }

  .link-card {
    background: var(--sand); border-radius: var(--radius-sm); padding: 18px 22px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; cursor: pointer; box-shadow: var(--neu-raised);
    transition: box-shadow .2s;
  }
  .link-card:hover { box-shadow: var(--neu-pizarra); }
  .link-url  { font-size: 13px; color: var(--pizarra); letter-spacing: .5px; font-family: monospace; }
  .link-copy { font-size: 10px; color: var(--piedra); }

  /* ══ COUNT PILL ═══════════════════════════════════ */
  .count-pill {
    display: inline-flex; align-items: center;
    background: var(--sand); border-radius: 100px;
    padding: 3px 11px; font-size: 11px; color: var(--piedra);
    margin-left: 9px; vertical-align: middle;
    box-shadow: var(--neu-flat);
  }

  /* ══ TOAST ════════════════════════════════════════ */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--carbon); color: var(--sand-lt);
    padding: 12px 22px; border-radius: 100px; font-size: 13px;
    box-shadow: var(--neu-raised-lg); opacity: 0;
    transform: translateY(8px); transition: all .3s;
    pointer-events: none; z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ══ ERROR LOG ════════════════════════════════════ */
  .error-log-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .error-card {
    background: var(--sand); border-radius: var(--radius-md);
    padding: 20px 22px; cursor: pointer;
    box-shadow: var(--neu-raised); transition: box-shadow .15s;
  }
  .error-card:hover    { box-shadow: var(--neu-raised-lg); }
  .error-card.expanded { box-shadow: var(--neu-raised-lg); }

  .error-card-severity {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 600; letter-spacing: .8px;
    text-transform: uppercase; padding: 4px 10px; border-radius: 100px; margin-bottom: 8px;
  }
  .sev-critico { background: rgba(196,112,112,.12); color: var(--red); }
  .sev-error   { background: rgba(196,133,106,.12); color: var(--terra); }
  .sev-aviso   { background: rgba(196,181,106,.12); color: #8a6f00; }
  .sev-info    { background: rgba(125,142,160,.12); color: var(--pizarra); }

  .error-title { font-size: 14px; font-weight: 500; color: var(--topo); margin-bottom: 4px; }
  .error-meta  { font-size: 11px; color: var(--piedra); }
  .error-detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.8); }
  .error-detail.open { display: block; }

  .error-section-title {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .error-explanation { font-size: 13px; color: var(--topo); line-height: 1.7; margin-bottom: 14px; }

  .fix-steps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .fix-step {
    display: flex; align-items: flex-start; gap: 12px;
    background: rgba(255,255,255,.6); border-radius: var(--radius-sm);
    padding: 11px 14px;
  }
  .fix-step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(145deg, #8b9eb2, var(--pizarra));
    color: white; font-size: 10px; font-weight: 700; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .fix-step-text { font-size: 13px; color: var(--topo); line-height: 1.5; }
  .fix-step-text b { font-weight: 500; }

  .error-raw {
    background: var(--carbon); color: #a0e0a0; font-family: monospace;
    font-size: 11px; padding: 12px 16px; border-radius: var(--radius-sm);
    overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    max-height: 120px; overflow-y: auto;
  }
  .error-log-empty { text-align: center; padding: 72px 20px; color: var(--piedra); }

</style>
</head>

<div class="toast" id="toast"></div>

<script>
// ── FIREBASE ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyB5l8pl4jzcJAvPahEu4w0Ay1PyFwvCgnk",
  authDomain: "smile-theapp.firebaseapp.com",
  projectId: "smile-theapp",
  storageBucket: "smile-theapp.firebasestorage.app",
  messagingSenderId: "723824118344",
  appId: "1:723824118344:web:aea955f3258d212343e67d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── AUTH ──────────────────────────────────────────────
// Credenciales hardcoded de admin SMILE (tú solo)
// Cuando quieras cambiarlas, cámbialas aquí
const ADMIN_CREDS = { user: 'gabo', password: '4498' };

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (email === ADMIN_CREDS.user && pass === ADMIN_CREDS.password) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    initApp();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPass').value = '';
}

// ── STATE ─────────────────────────────────────────────
let clinicas = [];
let currentSection = 'overview';

// ── INIT ──────────────────────────────────────────────
async function initApp() {
  // Show loading in main area
  document.getElementById('main').innerHTML = `
    <div style="padding:80px;text-align:center;color:var(--piedra)">
      <div style="font-size:32px;margin-bottom:16px;animation:spin 1s linear infinite;display:inline-block">⏳</div>
      <div style="font-size:13px;letter-spacing:2px">Conectando a Firebase...</div>
    </div>`;

  try {
    const auth = firebase.auth();
    if (!auth.currentUser) await auth.signInAnonymously();
    console.log('[Admin] Firebase auth OK — UID:', firebase.auth().currentUser?.uid);
  } catch(e) {
    console.warn('[Admin] Firebase auth warning:', e.message);
    showToast('⚠️ Auth: ' + e.message, 5000, '#c0392b');
  }
  await loadClinicas();
  showSection('overview');
  actualizarErrorBadge();
}

// Add spin keyframe if not present
const _spinStyle = document.createElement('style');
_spinStyle.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(_spinStyle);

async function recargarAdmin() {
  const btn = document.querySelector('[onclick="recargarAdmin()"]');
  if (btn) { btn.textContent = '↻ Cargando...'; btn.disabled = true; }
  await loadClinicas();
  showSection(currentSection);
  if (btn) { btn.textContent = '↻ Actualizar'; btn.disabled = false; }
}

async function loadClinicas() {
  try {
    const snap = await db.collection('clinicas').get();
    clinicas = await Promise.all(snap.docs.map(async doc => {
      const data = doc.data();
      // Load config sub-doc if exists
      let config = {};
      try {
        const cfgDoc = await db.collection('clinicas').doc(doc.id)
          .collection('config').doc('settings').get();
        if (cfgDoc.exists) config = cfgDoc.data();
      } catch(e) {}

      // Count patients
      let pacientes = 0;
      try {
        const pacSnap = await db.collection('clinicas').doc(doc.id)
          .collection('pacientes').get();
        pacientes = pacSnap.size;
      } catch(e) {
        pacientes = (data.pacientes || []).length;
      }

      return {
        id: doc.id,
        nombre: config.nombre || data.nombre || doc.id,
        ciudad: config.ciudad || data.ciudad || '—',
        color: config.color || '#C4856A',
        plan: config.plan || 'clinica',
        modulos: config.modulos || [],
        activa: config.activa !== false,
        exonerada: config.exonerada === true,
        trial: config.trialHasta ? new Date(config.trialHasta) > new Date() : false,
        trialHasta: config.trialHasta || null,
        adminEmail: config.adminEmail || '—',
        clinicaPadre: config.clinicaPadre || null,
        esSedePrincipal: config.esSedePrincipal || false,
        nombreSede: config.nombreSede || null,
        creadaEn: config.creadaEn || data.lastUpdated || null,
        migratedAt: data.migratedAt || null,
        pacientes,
        facturas: (data.facturas || []).length,
        citas: (data.citas || []).length,
        personalCount: (data.personal || []).length,
        // Calculate MRR from plan + modules
        mrr: calcMRR(config.plan, config.modulos, (data.personal||[]).length),
        waName:  config.contactoWA?.nombre || config.waName  || data.waName  || '',
        waCargo: config.contactoWA?.cargo  || config.waCargo || data.waCargo || '',
        waPhone: config.contactoWA?.phone  || config.waPhone || data.waPhone || '',
        lastLogin: data.lastLogin || config.lastLogin || data.lastUpdated || null,
        raw: { config: config, ...data },
        config,
      };
    }));
  } catch(e) {
    console.error('[Admin] Error loading clinicas:', e);
    clinicas = [];
    const main = document.getElementById('main');
    if (main) {
      main.innerHTML = `
        <div style="padding:60px;text-align:center;color:var(--piedra)">
          <div style="font-size:36px;margin-bottom:16px">🔥</div>
          <div style="font-size:17px;font-weight:300;color:var(--topo);margin-bottom:8px">Error conectando a Firebase</div>
          <div style="font-size:13px;margin-bottom:20px">${e.code || e.message}</div>
          <button onclick="recargarAdmin()" style="padding:12px 24px;background:var(--sand);
            border:none;border-radius:100px;font-family:inherit;font-size:12px;
            letter-spacing:2px;text-transform:uppercase;cursor:pointer;
            box-shadow:var(--neu-raised)">↻ Reintentar</button>
        </div>`;
    }
  }
}

function calcMRR(plan, modulos = [], personalCount = 0) {
  const BASE = plan === 'solo' ? 19 : 23; // USD
  const MODULE_PRICES = {
    laboratorio: 5, nomina: 5, inventario: 5,
    reportes: 5, multisucursal: 15, expediente: 0,
  };
  const extraUsers   = Math.max(0, personalCount - 1);
  const modulesTotal = (modulos || []).reduce((s, m) => s + (MODULE_PRICES[m] || 0), 0);
  return BASE + modulesTotal + (extraUsers * 2.5);
}

function fmtMRR(c) {
  return 'USD $' + (c.mrr % 1 === 0 ? c.mrr : c.mrr.toFixed(2));
}

// ── SECTIONS ──────────────────────────────────────────
async function showSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector(`.nav-item[data-section="${section}"]`);
  if (navEl) navEl.classList.add('active');

  const main = document.getElementById('main');
  if (section === 'overview') renderOverview(main);
  else if (section === 'clinicas') renderClinicas(main);
  else if (section === 'nueva') renderNuevaClinica(main);
  else if (section === 'contactos') renderContactos(main);
  else if (section === 'errores') await renderErrorLog(main);

}


// ── CONTACTOS ─────────────────────────────────────────
function renderContactos(main) {
  const filtro = window._contactosFiltro || 'todos';

  const lista = clinicas.filter(c => {
    if (filtro === 'activas') return c.activa && !c.trial;
    if (filtro === 'trial')   return c.trial;
    if (filtro === 'pausadas') return !c.activa;
    return true;
  }).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));

  const filterBtns = ['todos','activas','trial','pausadas'].map(f => `
    <button onclick="window._contactosFiltro='${f}';showSection('contactos')" style="
      padding:6px 16px;border:none;border-radius:100px;font-size:12px;font-family:inherit;
      cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;
      background:${filtro===f ? 'var(--topo)' : 'transparent'};
      color:${filtro===f ? 'var(--sand-lt)' : 'var(--piedra)'};">
      ${f.charAt(0).toUpperCase()+f.slice(1)}
    </button>`).join('');

  const cards = lista.map(c => {
    const statusColor = c.trial ? '#C4856A' : c.activa ? '#3a9e5f' : '#999';
    const statusLabel = c.trial ? 'Trial' : c.activa ? 'Activa' : 'Pausada';
    const waLink = c.waPhone
      ? `https://wa.me/1${c.waPhone.replace(/[^0-9]/g,'')}`
      : null;
    const trialDias = c.trialHasta
      ? Math.max(0, Math.ceil((new Date(c.trialHasta) - new Date()) / (1000*60*60*24)))
      : null;
    const lastLoginStr = c.lastLogin
      ? new Date(c.lastLogin).toLocaleDateString('es-DO', {day:'numeric',month:'short',year:'numeric'})
      : '—';
    const modulosStr = c.modulos.length
      ? c.modulos.map(m => m.charAt(0).toUpperCase()+m.slice(1)).join(' · ')
      : 'Base';

    return `
    <div style="background:var(--sand);border-radius:16px;padding:20px 24px;
                border:1.5px solid rgba(168,159,150,.12);margin-bottom:10px;
                display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <div style="font-size:15px;font-weight:400;color:var(--topo)">${c.nombre}</div>
          <span style="padding:3px 10px;border-radius:100px;font-size:10px;letter-spacing:1px;
                       background:${statusColor}18;color:${statusColor}">${statusLabel}</span>
          ${c.trial && trialDias !== null ? `<span style="font-size:11px;color:var(--piedra)">${trialDias}d restantes</span>` : ''}
        </div>
        <div style="font-size:12px;color:var(--piedra);margin-bottom:4px">
          ${c.waName ? `<strong style="color:var(--topo)">${c.waName}</strong>${c.waCargo ? ' · ' + c.waCargo : ''}` : '<span style="color:var(--muted)">Sin contacto WA</span>'}
        </div>
        <div style="font-size:12px;color:var(--piedra);margin-bottom:8px">
          ${c.waPhone ? c.waPhone : ''}
          ${c.adminEmail !== '—' ? ` · ${c.adminEmail}` : ''}
        </div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--piedra)">
          <span>📦 ${c.plan === 'solo' ? 'Solo' : 'Clínica'}</span>
          <span>💰 ${fmtMRR(c)}/mes</span>
          <span>🧩 ${modulosStr}</span>
          <span>🕐 ${lastLoginStr}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        ${waLink ? `<a href="${waLink}" target="_blank" style="
          padding:8px 16px;background:#25D366;color:white;border-radius:100px;
          text-decoration:none;font-size:12px;font-family:inherit;
          display:flex;align-items:center;gap:6px;white-space:nowrap">
          💬 WhatsApp
        </a>` : '<span style="font-size:11px;color:var(--piedra);opacity:0.5">Sin WA</span>'}
        <button onclick="openClinicDetail('${c.id}')" style="
          padding:8px 16px;background:transparent;color:var(--piedra);
          border:none;border-radius:100px;box-shadow:var(--neu-flat);
          font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap;
          transition:all 0.15s"
          onmouseover="this.style.borderColor='var(--terra)';this.style.color='var(--terra)'"
          onmouseout="this.style.borderColor='rgba(168,159,150,.25)';this.style.color='var(--piedra)'">
          Ver clínica →
        </button>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Contactos</div>
          <div class="page-sub">${lista.length} clínica${lista.length !== 1 ? 's' : ''} · Actualizado en tiempo real</div>
        </div>
        <div style="display:flex;gap:4px;background:var(--sand-lt);
                    border-radius:100px;padding:4px;border:1.5px solid rgba(168,159,150,.12)">
          ${filterBtns}
        </div>
      </div>

      ${lista.length === 0 ? `
        <div style="text-align:center;padding:60px 20px;color:var(--piedra)">
          <div style="font-size:32px;margin-bottom:12px">📋</div>
          <div>No hay clínicas en este filtro</div>
        </div>` : cards}
    </div>
  `;
}

// ── OVERVIEW ──────────────────────────────────────────
function renderOverview(main) {
  const activas = clinicas.filter(c => c.activa && !c.trial);
  const trials  = clinicas.filter(c => c.trial);
  const mrr     = clinicas.filter(c => c.activa && !c.trial).reduce((s, c) => s + c.mrr, 0);
  const totalPacientes = clinicas.reduce((s, c) => s + c.pacientes, 0);

  main.innerHTML = `
    <div class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Overview</div>
          <div class="page-sub">Estado actual de SMILE.app</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="header-btn" onclick="recargarAdmin()" style="background:none;box-shadow:var(--neu-flat);border:none;color:var(--piedra)" title="Actualizar datos">↻ Actualizar</button>
          <button class="header-btn" onclick="showSection('nueva')">+ Nueva clínica</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--terra)"></div>
          <div class="stat-label">MRR (USD)</div>
          <div class="stat-val">USD $${clinicas.filter(c=>c.activa&&!c.trial).reduce((s,c)=>s+c.mrr,0).toFixed(0)}</div>
          <div class="stat-sub">${activas.length} activas · ${trials.length} en trial</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--pizarra)"></div>
          <div class="stat-label">Clínicas totales</div>
          <div class="stat-val">${clinicas.length}</div>
          <div class="stat-sub">${trials.length} en trial</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--green)"></div>
          <div class="stat-label">Pacientes totales</div>
          <div class="stat-val">${totalPacientes.toLocaleString()}</div>
          <div class="stat-sub">En todas las clínicas</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent" style="background:var(--rosa)"></div>
          <div class="stat-label">ARR proyectado (RD$)</div>
          <div class="stat-val">USD $${(clinicas.filter(c=>c.activa&&!c.trial).reduce((s,c)=>s+c.mrr,0)*12).toFixed(0)}</div>
          <div class="stat-sub">Solo clínicas activas RD$</div>
        </div>
      </div>

      <div class="section-title">Clínicas activas <span class="count-pill">${activas.length}</span></div>
      ${renderClinicsTable(clinicas, 'compact')}
    </div>
  `;
}

// ── CLÍNICAS ──────────────────────────────────────────
function renderClinicas(main) {
  main.innerHTML = `
    <div class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Clínicas <span class="count-pill">${clinicas.length}</span></div>
          <div class="page-sub">Todas las clínicas registradas en SMILE.app</div>
        </div>
        <button class="header-btn" onclick="showSection('nueva')">+ Nueva clínica</button>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="filterClinicas('todas', this)">Todas</button>
        <button class="tab-btn" onclick="filterClinicas('activas', this)">Activas</button>
        <button class="tab-btn" onclick="filterClinicas('trial', this)">En trial</button>
      </div>

      <div id="clinicasTableWrap">
        ${renderClinicsTable(clinicas)}
      </div>
    </div>
  `;
}

function filterClinicas(filter, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let list = clinicas;
  if (filter === 'activas') list = clinicas.filter(c => c.activa && !c.trial);
  if (filter === 'trial')   list = clinicas.filter(c => c.trial);
  document.getElementById('clinicasTableWrap').innerHTML = renderClinicsTable(list);
}

function renderClinicsTable(list) {
  if (list.length === 0) {
    return `<div class="clinics-table">
      <div class="empty-state">
        <div class="empty-icon">🏥</div>
        <div class="empty-title">Sin clínicas registradas</div>
        <div class="empty-sub">Agrega tu primera clínica para comenzar</div>
      </div>
    </div>`;
  }

  const rows = list.map(c => {
    const statusBadge = c.trial
      ? `<span class="badge badge-trial"><span class="badge-dot"></span>Trial</span>`
      : c.activa
        ? `<span class="badge badge-active"><span class="badge-dot"></span>Activa</span>`
        : `<span class="badge badge-paused"><span class="badge-dot"></span>Pausada</span>`;

    const planLabel = c.plan === 'solo' ? 'Solo' : c.plan === 'clinica' ? 'Clínica' : c.plan;

    return `
      <div class="clinic-row" onclick="openClinicDetail('${c.id}')">
        <div>
          <div class="clinic-name">${c.nombre}</div>
          <div class="clinic-id">${c.id}</div>
        </div>
        <div>${statusBadge}</div>
        <div><span class="plan-tag">${planLabel}</span></div>
        <div>
          <div class="amount">${fmtMRR(c)}</div>
          <div class="amount-sub">/ mes</div>
        </div>
        <div style="font-size:13px;color:var(--piedra)">${c.pacientes.toLocaleString()} pac · ${c.ciudad}</div>
        <div class="row-actions" onclick="event.stopPropagation()">
          <button class="action-btn" title="Ver app" onclick="openApp('${c.id}')">↗</button>
          <button class="action-btn" title="Editar" onclick="openEditModal('${c.id}')">✎</button>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="clinics-table">
      <div class="table-header">
        <div>Clínica</div>
        <div>Estado</div>
        <div>Plan</div>
        <div>MRR</div>
        <div>Datos</div>
        <div></div>
      </div>
      ${rows}
    </div>`;
}

// ── CLINIC DETAIL MODAL ───────────────────────────────
function openClinicDetail(id) {
  const c = clinicas.find(x => x.id === id);
  if (!c) return;

  const appUrl = `${window.location.origin}${window.location.pathname.replace('admin.html','')}app.html?clinica=${c.id}`;

  document.getElementById('modalTitle').textContent = c.nombre;
  document.getElementById('modalBody').innerHTML = `
    <div class="detail-grid">

function autoSlug(val) {
  const slug = val.toLowerCase()
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e')
    .replace(/[íìï]/g,'i').replace(/[óòö]/g,'o')
    .replace(/[úùü]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const el = document.getElementById('new-id');
  if (el) el.value = slug;
}

async function crearClinica() {
  const nombre      = document.getElementById('new-nombre').value.trim();
  const id          = document.getElementById('new-id').value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
  const ciudad      = document.getElementById('new-ciudad').value.trim();
  const plan        = document.getElementById('new-plan').value;
  const email       = document.getElementById('new-email').value.trim();
  const adminNombre = document.getElementById('new-admin-nombre').value.trim() || 'Administrador';
  const color       = document.getElementById('new-color').value;
  const modulos     = [...document.querySelectorAll('.modules-check-grid input:checked')].map(i => i.value);

  if (!nombre || !id || !email) {
    showToast('⚠️ Nombre, ID y email son requeridos');
    return;
  }

  const btn = document.querySelector('[onclick="crearClinica()"]');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Creando...'; }

  try {
    // Check if ID already exists
    const existing = await db.collection('clinicas').doc(id).get();
    if (existing.exists) {
      showToast('⚠️ Ya existe una clínica con ese ID');
      if (btn) { btn.disabled = false; btn.textContent = '🏥 Crear clínica'; }
      return;
    }

    // Generate a 4-digit PIN and hash it with the clinic ID as salt
    const pinPlain = String(Math.floor(1000 + Math.random() * 9000));
    const pinHash  = await adminHashPin(id, pinPlain);
    const personal = [{
      id: '1',
      nombre: adminNombre,
      tipo: 'regular',
      password: pinHash,
      _pwHashed: true,
      isAdmin: true,
      canAccessReception: true,
      email: email,
    }];

    // Create main document
    await db.collection('clinicas').doc(id).set({
      facturas: [], personal,
      gastos: [], avances: [], cuadresDiarios: {},
      citas: [], laboratorios: [], reversiones: [], auditLogs: [],
      pacientes: [], usaSubcollectionPacientes: true,
      lastUpdated: new Date().toISOString(),
    });

    // Create config/settings
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({
        nombre, clinicaId: id, ciudad, plan,
        adminEmail: email, color, modulos,
        activa: true, trial: true,
        creadaEn: new Date().toISOString(),
        trialHasta: getTrial14Days(),
        mrr: calcMRR(plan, modulos, 1),
      });

    // Show success with the PIN so admin can share it
    showToast('✅ Clínica creada — PIN admin: ' + pinPlain, 8000);
    setTimeout(() => {
      document.getElementById('modalTitle').textContent = '✅ Clínica creada';
      document.getElementById('modalBody').innerHTML = `
        <div style="text-align:center;padding:16px 0 8px">
          <div style="font-size:13px;color:var(--piedra);margin-bottom:24px;line-height:1.7">
            <strong style="color:var(--topo)">${nombre}</strong> está lista.<br>
            Comparte este PIN con el administrador:
          </div>
          <div style="background:rgba(255,255,255,.4);border-radius:16px;padding:28px;
                      margin-bottom:20px;box-shadow:var(--neu-raised)">
            <div style="font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
                        color:var(--muted);margin-bottom:12px;font-weight:600">PIN de acceso</div>
            <div style="font-family:monospace;font-size:40px;letter-spacing:10px;
                        color:var(--pizarra);font-weight:300">${pinPlain}</div>
            <div style="font-size:12px;color:var(--piedra);margin-top:10px">
              Usuario: <strong>${adminNombre}</strong>
            </div>
          </div>
          <div style="font-size:11px;color:var(--muted)">
            El cliente puede cambiarlo desde Ajustes → Personal

        </div>

          <button class="btn-cancel" onclick="closeModal()">Cerrar</button>
          <button class="btn-save" onclick="copyToClipboard('${pinPlain}');showToast('✓ PIN copiado')">
            Copiar PIN
          </button>
        </div>`;
      document.getElementById('modalOverlay').classList.add('open');
    }, 400);

    await loadClinicas();
    showSection('clinicas');
  } catch(e) {
    showToast('❌ Error: ' + e.message);
    console.error(e);
    if (btn) { btn.disabled = false; btn.textContent = '🏥 Crear clínica'; }
  }

// SHA-256 hash matching app.js verifyPassword logic
// salt = clinicId (same as CLINIC_PATH in app.js)
async function adminSha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function adminHashPin(clinicId, pin) {
  return adminSha256(clinicId + ':' + pin);
}

function getDefaultPersonal(clinicNombre) {
  // Legacy — now crearClinica generates a real hashed PIN
  return [{ id:'1', nombre:'Administrador', tipo:'regular', password:'1234', isAdmin:true, canAccessReception:true }];
}

function getTrial14Days() {
  const d = new Date();
  d.setDate(d.getDate() + 14);
  return d.toISOString();
}

// ── ACTIONS ───────────────────────────────────────────

function openApp(id) {
  const base = window.location.origin + window.location.pathname.replace('admin.html','');
  window.open(base + 'app.html?clinica=' + id, '_blank');
}

function copyClinicLink(id) {
  const base = window.location.origin + window.location.pathname.replace('admin.html','');
  navigator.clipboard?.writeText(base + 'app.html?clinica=' + id)
    .then(() => showToast('🔗 Link copiado'));
}

async function toggleStatus(id) {
  const c = clinicas.find(x => x.id === id);
  if (!c) return;
  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({ activa: !c.activa }, { merge: true });
    closeModal();
    showToast(c.activa ? '⏸ Clínica pausada' : '✅ Clínica reactivada');
    await loadClinicas();
    showSection(currentSection);
  } catch(e) { showToast('❌ ' + e.message); }
}

// ── RESET CONTRASEÑA ─────────────────────────────────
function openResetPassword(id) {
  const c = clinicas.find(x => x.id === id);
  if (!c) return;
  const newPass      = String(Math.floor(1000 + Math.random() * 9000));
  const adminNombre  = c.raw?.personal?.find(p => p.isAdmin)?.nombre
                    || c.raw?.personal?.[0]?.nombre
                    || 'Administrador';

  document.getElementById('modalTitle').textContent = '🔑 Reset PIN — ' + c.nombre;
  document.getElementById('modalBody').innerHTML = `
    <div style="text-align:center;padding:16px 0 24px">
      <div style="font-size:13px;color:var(--piedra);margin-bottom:28px;line-height:1.7">
        Se generará un PIN de 4 dígitos para el admin.<br>Compártelo con el cliente por WhatsApp.
      </div>
      <div style="background:rgba(255,255,255,.4);border-radius:16px;padding:28px;margin-bottom:20px;box-shadow:var(--neu-raised)">
        <div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--piedra);margin-bottom:12px">Nuevo PIN</div>
        <div style="font-family:monospace;font-size:36px;letter-spacing:8px;color:var(--pizarra)">${newPass}</div>
        <div style="font-size:12px;color:var(--piedra);margin-top:12px">Usuario: <strong>${adminNombre}</strong></div>
      </div>
      <div style="font-size:12px;color:var(--muted)">Se guarda en Firebase al confirmar.</div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="confirmResetPassword('${id}','${newPass}')">Confirmar y guardar</button>
    </div>
  `;
}

async function confirmResetPassword(id, newPass) {
  try {
    const pinHash = await adminHashPin(id, newPass);
    const doc     = await db.collection('clinicas').doc(id).get();
    const pers    = doc.data()?.personal || [];
    const updated = pers.length
      ? pers.map((p,i) => (p.isAdmin || i===0) ? {...p, password: pinHash, _pwHashed: true} : p)
      : [{ id:'1', nombre:'Administrador', isAdmin:true, password:pinHash, _pwHashed:true, canAccessReception:true }];
    await db.collection('clinicas').doc(id).update({ personal: updated });
    closeModal();
    showToast('✅ PIN reseteado: ' + newPass);
    await loadClinicas();
  } catch(e) { showToast('❌ ' + e.message); }
}

// ── EXONERAR PAGO ────────────────────────────────────────
async function toggleExonerada(id, value) {
  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({ exonerada: value }, { merge: true });
    showToast(value ? '✅ Clínica exonerada de pago' : '✅ Exoneración eliminada');
    await loadClinicas();
    openClinicDetail(id);
  } catch(e) { showToast('❌ ' + e.message); }
}

// ── EXTENDER TRIAL ────────────────────────────────────
function extendTrial(id) {
  const c   = clinicas.find(x => x.id === id);
  if (!c) return;
  const base = c.trialHasta
    ? new Date(Math.max(new Date(c.trialHasta), new Date()))
    : new Date();
  const d7   = new Date(base); d7.setDate(d7.getDate()+7);
  const d14  = new Date(base); d14.setDate(d14.getDate()+14);
  const d30  = new Date(base); d30.setDate(d30.getDate()+30);
  const fmt  = d => d.toLocaleDateString('es-DO',{day:'numeric',month:'long',year:'numeric'});
  const btn  = (days, date) => `
    <button onclick="confirmExtendTrial('${id}','${date.toISOString()}')"
      style="padding:16px 20px;background:var(--sand);border:1.5px solid rgba(168,159,150,.14);
             border-radius:12px;color:var(--topo);font-family:inherit;font-size:14px;
             cursor:pointer;text-align:left;width:100%;transition:background 0.2s,border-color 0.2s"
      onmouseover="this.style.boxShadow='var(--neu-terra)';this.style.color='var(--terra)'"
      onmouseout="this.style.background='var(--sand)';this.style.borderColor='rgba(168,159,150,.14)'">
      <span style="color:var(--terra);font-weight:500">+${days} días</span>
      <span style="color:var(--piedra);font-size:12px;float:right">hasta ${fmt(date)}</span>
    </button>`;

  document.getElementById('modalTitle').textContent = '📅 Extender trial — ' + c.nombre;
  document.getElementById('modalBody').innerHTML = `
    <div style="padding:8px 0 4px">
      <div style="font-size:13px;color:var(--piedra);margin-bottom:20px">
        Trial actual: <strong style="color:${c.trial?'var(--terra)':'#999'}">${c.trialHasta ? fmt(new Date(c.trialHasta)) : 'Vencido'}</strong>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${btn(7,d7)}${btn(14,d14)}${btn(30,d30)}
      </div>
    </div>
    <div class="modal-footer" style="margin-top:20px">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  `;
}

async function confirmExtendTrial(id, newDate) {
  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').update({
        trial: true,
        trialHasta: newDate,
        trialExtendidoEn: new Date().toISOString()
      });
    closeModal();
    showToast('✅ Trial extendido hasta '
      + new Date(newDate).toLocaleDateString('es-DO',{day:'numeric',month:'long'}));
    await loadClinicas();
    showSection(currentSection);
  } catch(e) { showToast('❌ ' + e.message); }
}

function copyToClipboard(text) {
  navigator.clipboard?.writeText(text).then(() => showToast('✓ Link copiado'));
}

function showToast(msg, duration = 3000, bg = null) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  if (bg) t.style.background = bg; else t.style.background = '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>

function getSeveridadLabel(sev) {
  const labels = { critico: '🔴 Crítico', error: '🟠 Error', aviso: '🟡 Aviso', info: '🔵 Info' };
  return labels[sev] || '⚪ Desconocido';
}

function formatErrorTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-DO', { day: 'numeric', month: 'short', year: 'numeric' }) +
         ' · ' + d.toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit' });
}

let _errFiltro = 'todos';
let _errLogs   = [];  // cache local de los logs cargados

async function cargarErrorLogs() {
  const errores = [];

  // 1. Leer auditLogs de cada clínica (los errores están embebidos ahí)
  for (const clinica of clinicas) {
    try {
      const doc = await db.collection('clinicas').doc(clinica.id).get();
      if (!doc.exists) continue;
      const logs = doc.data().auditLogs || [];
      logs.filter(l => l.tipo === 'error' || l.error || l.codigo).forEach(l => {
        errores.push({
          ...l,
          _docId: null, // embebido — no tiene docId en smile_errors
          clinicaId:    clinica.id,
          clinicaNombre: clinica.nombre || clinica.id,
        });
      });
    } catch(e) { console.warn('[ErrorLog] Skipping', clinica.id, e.message); }
  }

  // 2. Leer colección global smile_errors (si existe)
  try {
    const errSnap = await db.collection('smile_errors')
      .orderBy('fecha', 'desc').limit(200).get();
    errSnap.docs.forEach(d => {
      const data = d.data();
      // Avoid duplicates: skip if same clinica+fecha+codigo already in list
      const dup = errores.find(e =>
        e.clinicaId === data.clinicaId &&
        e.fecha     === data.fecha &&
        e.codigo    === data.codigo);
      if (!dup) errores.push({ ...data, _docId: d.id });
    });
  } catch(e) {
    // colección smile_errors no existe aún — normal en instalaciones nuevas
    console.info('[ErrorLog] smile_errors no existe aún, mostrando solo auditLogs embebidos');
  }

  errores.sort((a, b) => new Date(b.fecha || 0) - new Date(a.fecha || 0));
  _errLogs = errores;
  return errores;
}

function toggleErrorCard(id) {
  const detail = document.getElementById('detail-' + id);
  const card   = document.getElementById('card-' + id);
  if (!detail) return;
  detail.classList.toggle('open');
  card.classList.toggle('expanded');
}

function marcarResuelto(id, activo, event) {
  event.stopPropagation();
  const btn = document.getElementById('resolve-' + id);
  const idx = _errLogs.findIndex(e => e._docId === id || e.id === id);
  if (idx < 0) return;
  _errLogs[idx]._resuelto = activo;
  if (activo) {
    btn.textContent = '✓ Resuelto';
    btn.className = 'resolve-btn resolved';
    btn.onclick = (ev) => marcarResuelto(id, false, ev);
    // Guardar en Firestore si tiene docId
    if (_errLogs[idx]._docId) {
      db.collection('smile_errors').doc(_errLogs[idx]._docId).update({ resuelto: true, resueltoEn: new Date().toISOString() }).catch(() => {});
    }
  } else {
    btn.textContent = '↩ Reabrir';
    btn.className = 'resolve-btn unresolved';
    btn.onclick = (ev) => marcarResuelto(id, true, ev);
    if (_errLogs[idx]._docId) {
      db.collection('smile_errors').doc(_errLogs[idx]._docId).update({ resuelto: false }).catch(() => {});
    }
  }
}

function filtrarYRenderErrorList(container) {
  let lista = _errLogs;
  if (_errFiltro === 'abiertos')       lista = lista.filter(e => !e._resuelto && !e.resuelto);
  else if (_errFiltro === 'resueltos') lista = lista.filter(e => e._resuelto || e.resuelto);
  else if (_errFiltro !== 'todos')     lista = lista.filter(e => e.severidad === _errFiltro);

  if (lista.length === 0) {
    container.innerHTML = `
      <div class="error-log-empty">
        <div class="empty-icon">${_errFiltro === 'resueltos' ? '✅' : '🎉'}</div>
        <div class="empty-title">${_errFiltro === 'resueltos' ? 'No hay errores resueltos aún' : '¡Sin errores registrados!'}</div>
        <div class="empty-sub">Cuando algo falle en cualquier clínica, aparecerá aquí con instrucciones para resolverlo.</div>
      </div>`;
    return;
  }

  container.innerHTML = lista.map((err, i) => {
    const uid = err._docId || err.id || ('err-' + i);
    const kb  = ERROR_KB[err.codigoError] || ERROR_KB[err.codigo] || ERROR_KB['DEFAULT'];
    const sev = err.severidad || kb.severidad || 'error';
    const titulo = err.titulo || kb.titulo || 'Error sin clasificar';
    const resuelto = err._resuelto || err.resuelto;

    return `
    <div class="error-card ${resuelto ? 'opacity: 0.6' : ''}" id="card-${uid}" onclick="toggleErrorCard('${uid}')"
         style="${resuelto ? 'opacity:0.55' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="flex:1;min-width:0">
          <div class="error-card-severity sev-${sev}">${getSeveridadLabel(sev)}</div>
          <div class="error-title">${titulo}</div>
          <div class="error-meta">
            🏥 ${err.clinicaNombre || err.clinicaId || 'Sin clínica'} &nbsp;·&nbsp;
            🕐 ${formatErrorTime(err.fecha)} &nbsp;·&nbsp;
            👤 ${err.usuario || 'Sistema'}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <button id="resolve-${uid}"
            class="resolve-btn ${resuelto ? 'resolved' : 'unresolved'}"
            onclick="${resuelto ? `marcarResuelto('${uid}',false,event)` : `marcarResuelto('${uid}',true,event)`}">
            ${resuelto ? '✓ Resuelto' : '↩ Marcar resuelto'}
          </button>
          <span style="font-size:18px;color:var(--piedra);transform:rotate(${0}deg);transition:transform 0.2s" id="chevron-${uid}">›</span>
        </div>
      </div>

      <div class="error-detail" id="detail-${uid}">
        <div class="error-section-title">¿Qué pasó?</div>
        <div class="error-explanation">${kb.explicacion || err.mensaje || 'Sin descripción disponible.'}</div>

        <div class="error-section-title">Cómo resolverlo</div>
        <div class="fix-steps">
          ${(kb.pasos || []).map((p, n) => `
            <div class="fix-step">
              <div class="fix-step-num">${n + 1}</div>
              <div class="fix-step-text"><b>${p.accion}</b> — ${p.detalle}</div>
            </div>`).join('')}
        </div>

        ${(err.detalle || err.rawError) ? `
          <div class="error-section-title">Detalle técnico (para desarrolladores)</div>
          <div class="error-raw">${(err.detalle || err.rawError || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
        ` : ''}
      </div>
    </div>`;
  }).join('');
}

async function renderErrorLog(main) {
  main.innerHTML = `
    <div class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Log de Errores</div>
          <div class="page-sub">Errores de todas las clínicas · con explicación y pasos para resolver</div>
        </div>
        <button class="header-btn" onclick="recargarErrorLog()" style="background:none;box-shadow:var(--neu-flat);border:none;color:var(--piedra)">
          ↻ Actualizar
        </button>
      </div>

      <div class="error-filters">
        <button class="filter-pill active" onclick="setErrFiltro('todos', this)">Todos</button>
        <button class="filter-pill" onclick="setErrFiltro('abiertos', this)">Sin resolver</button>
        <button class="filter-pill" onclick="setErrFiltro('resueltos', this)">Resueltos</button>
        <button class="filter-pill" onclick="setErrFiltro('critico', this)">🔴 Crítico</button>
        <button class="filter-pill" onclick="setErrFiltro('error', this)">🟠 Error</button>
        <button class="filter-pill" onclick="setErrFiltro('aviso', this)">🟡 Aviso</button>
        <button class="filter-pill" onclick="setErrFiltro('info', this)">🔵 Info</button>
      </div>

      <div id="errorLogContainer">
        <div style="text-align:center;padding:60px 20px;color:var(--piedra)">
          <div style="font-size:24px;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block">⏳</div>
          <div>Cargando errores de todas las clínicas...</div>
        </div>
      </div>
    </div>
  `;

  try {
    await cargarErrorLogs();
  } catch(e) {
    console.error('[Admin] Error cargando error logs:', e);
  }
  // Verificar que el container sigue en el DOM (el usuario pudo navegar a otro tab)
  const container = document.getElementById('errorLogContainer');
  if (container) filtrarYRenderErrorList(container);
}

function setErrFiltro(filtro, btn) {
  _errFiltro = filtro;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const container = document.getElementById('errorLogContainer');
  if (container) filtrarYRenderErrorList(container);
}

async function recargarErrorLog() {
  const container = document.getElementById('errorLogContainer');
  if (!container) return;
  container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--piedra)">↻ Actualizando...</div>';
  await cargarErrorLogs();
  filtrarYRenderErrorList(container);
}

// Actualizar el badge de errores en el nav cuando carga el admin
async function actualizarErrorBadge() {
  try {
    // Count errors from smile_errors collection
    let count = 0;
    try {
      const snap = await db.collection('smile_errors')
        .where('resuelto', '==', false).limit(99).get();
      count += snap.size;
    } catch(e) { /* colección no existe — normal */ }

    // Also count unresolved auditLog errors from all clinics
    for (const cl of clinicas) {
      try {
        const doc = await db.collection('clinicas').doc(cl.id).get();
        if (!doc.exists) continue;
        const logs = doc.data().auditLogs || [];
        count += logs.filter(l => (l.tipo==='error'||l.error||l.codigo) && !l.resuelto).length;
      } catch(e) {}
      if (count >= 99) break;
    }

    const badge = document.getElementById('errorBadge');
    if (!badge) return;
    if (count > 0) {
      badge.textContent = count > 9 ? '9+' : count;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  } catch(e) { console.warn('[Badge]', e.message); }
}
