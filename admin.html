<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMILE — Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEEAE4;
    --surface: #F5F2EE;
    --white: #FDFCFB;
    --dark: #1E1C1A;
    --mid: #9C9189;
    --light: #CEC8C0;
    --terracota: #C4856A;
    --rosa: #E8C4B8;
    --azul: #7B8FA1;
    --green: #6B8F71;
    --red: #C47070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 300;
    background: var(--bg);
    color: var(--dark);
    -webkit-font-smoothing: antialiased;
  }

  /* ── LOGIN ── */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
  }

  .login-card {
    background: var(--white);
    border-radius: 24px;
    padding: 48px;
    width: 360px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  }

  .login-logo {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 7px;
    color: var(--dark);
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--terracota);
    margin-bottom: 40px;
  }

  .login-field { margin-bottom: 16px; }
  .login-field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); margin-bottom: 8px; }
  .login-field input {
    width: 100%;
    padding: 14px 18px;
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 300;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }
  .login-field input:focus { border-color: var(--terracota); }

  .login-error { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }

  .login-btn {
    width: 100%;
    padding: 16px;
    background: var(--dark);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .login-btn:hover { background: var(--terracota); }

  /* ── LAYOUT ── */
  .app { display: none; min-height: 100vh; }
  .app.visible { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 0;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .sidebar-logo {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 6px;
    color: var(--surface);
    padding: 0 28px;
    margin-bottom: 4px;
  }

  .sidebar-role {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--terracota);
    padding: 0 28px;
    margin-bottom: 40px;
  }

  .sidebar-nav { flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 28px;
    font-size: 13px;
    color: #6B635C;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 2px solid transparent;
  }

  .nav-item:hover { color: var(--surface); }
  .nav-item.active { color: var(--surface); border-left-color: var(--terracota); background: rgba(255,255,255,0.04); }
  .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-bottom {
    padding: 0 28px;
    border-top: 1px solid #2C2A28;
    padding-top: 24px;
    margin-top: 24px;
  }

  .sidebar-version { font-size: 11px; color: #3A3836; letter-spacing: 1px; }

  /* ── ERROR LOG ── */
  .error-log-list { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }

  .error-card {
    background: var(--white);
    border: 1.5px solid transparent;
    border-radius: 16px;
    padding: 20px 24px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .error-card:hover { border-color: rgba(196,112,112,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
  .error-card.expanded { border-color: rgba(196,112,112,0.4); }
  .error-card-severity {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 100px; margin-bottom: 10px;
  }
  .sev-critico  { background: #fde8e8; color: #9b2c2c; }
  .sev-error    { background: #fef0e0; color: #7b4a00; }
  .sev-aviso    { background: #fefce8; color: #713f12; }
  .sev-info     { background: #e8f4fd; color: #1a4a6b; }

  .error-title { font-size: 15px; font-weight: 600; color: var(--dark); margin-bottom: 4px; }
  .error-meta  { font-size: 12px; color: var(--mid); margin-bottom: 0; }
  .error-detail { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--bg); }
  .error-detail.open { display: block; }

  .error-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--mid); margin-bottom: 8px; }
  .error-explanation  { font-size: 14px; color: var(--dark); line-height: 1.7; margin-bottom: 16px; }

  .fix-steps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .fix-step {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--surface); border-radius: 10px; padding: 12px 14px;
  }
  .fix-step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--terracota); color: white;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .fix-step-text { font-size: 13px; color: var(--dark); line-height: 1.5; }
  .fix-step-text b { font-weight: 600; }

  .error-raw {
    background: #1E1C1A; color: #a0f0a0; font-family: monospace;
    font-size: 11px; padding: 12px 16px; border-radius: 10px;
    overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    max-height: 120px; overflow-y: auto;
  }

  .error-log-empty {
    text-align: center; padding: 80px 20px; color: var(--mid);
  }
  .error-log-empty .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .error-log-empty .empty-title { font-size: 18px; font-weight: 300; margin-bottom: 8px; color: var(--dark); }
  .error-log-empty .empty-sub { font-size: 14px; }

  .error-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-pill {
    padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 500;
    border: 1.5px solid var(--light); background: transparent; color: var(--mid);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .filter-pill.active, .filter-pill:hover { background: var(--dark); color: var(--white); border-color: var(--dark); }

  .resolve-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 600;
    border: none; cursor: pointer; font-family: inherit; transition: opacity 0.15s;
  }
  .resolve-btn:hover { opacity: 0.75; }
  .resolve-btn.resolved { background: var(--surface); color: var(--mid); }
  .resolve-btn.unresolved { background: var(--green); color: white; }

  .logout-btn {
    font-size: 12px;
    color: #4A4440;
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    padding: 8px 0;
    transition: color 0.2s;
    display: block;
    margin-top: 8px;
  }
  .logout-btn:hover { color: var(--red); }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 40px 48px;
  }

  /* PAGE HEADER */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
  }

  .page-title { font-size: 32px; font-weight: 200; letter-spacing: -1px; color: var(--dark); }
  .page-sub { font-size: 14px; color: var(--mid); margin-top: 4px; }

  .header-btn {
    background: var(--dark);
    color: var(--white);
    border: none;
    padding: 14px 28px;
    border-radius: 100px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 4px 16px rgba(30,28,26,0.15);
  }
  .header-btn:hover { background: var(--terracota); }

  /* TABS */
  .tab-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 32px;
    background: var(--white);
    border-radius: 14px;
    padding: 4px;
    width: fit-content;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .tab-btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--mid);
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    transition: all 0.2s;
  }

  .tab-btn.active { background: var(--dark); color: var(--white); }

  /* ── OVERVIEW STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--white);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }

  .stat-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); margin-bottom: 16px; }
  .stat-val { font-size: 36px; font-weight: 200; letter-spacing: -1px; color: var(--dark); margin-bottom: 8px; }
  .stat-sub { font-size: 12px; color: var(--light); }
  .stat-accent { width: 32px; height: 3px; border-radius: 2px; margin-bottom: 16px; }

  /* ── CLINICS TABLE ── */
  .section-title { font-size: 18px; font-weight: 400; color: var(--dark); margin-bottom: 20px; }

  .clinics-table {
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 32px;
  }

  .table-header {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 80px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--bg);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--light);
  }

  .clinic-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1.2fr 1fr 80px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--surface);
    align-items: center;
    transition: background 0.15s;
    cursor: pointer;
  }
  .clinic-row:last-child { border-bottom: none; }
  .clinic-row:hover { background: var(--surface); }

  .clinic-name { font-size: 14px; font-weight: 400; color: var(--dark); }
  .clinic-id { font-size: 11px; color: var(--light); margin-top: 2px; letter-spacing: 1px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 400;
  }

  .badge-active { background: rgba(107,143,113,0.12); color: var(--green); }
  .badge-trial  { background: rgba(196,133,106,0.12); color: var(--terracota); }
  .badge-paused { background: rgba(196,112,112,0.12); color: var(--red); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .plan-tag {
    font-size: 11px;
    color: var(--mid);
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .amount { font-size: 15px; font-weight: 400; color: var(--dark); }
  .amount-sub { font-size: 11px; color: var(--light); }

  .row-actions { display: flex; gap: 8px; }

  .action-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 1px solid var(--light);
    background: none;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--mid);
  }
  .action-btn:hover { border-color: var(--terracota); color: var(--terracota); background: rgba(196,133,106,0.06); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 64px 32px;
    color: var(--mid);
  }
  .empty-icon { font-size: 40px; margin-bottom: 16px; }
  .empty-title { font-size: 18px; font-weight: 300; margin-bottom: 8px; color: var(--dark); }
  .empty-sub { font-size: 14px; color: var(--mid); }

  /* LOADING */
  .loading-row {
    padding: 48px;
    text-align: center;
    color: var(--light);
    font-size: 13px;
    letter-spacing: 2px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,28,26,0.5);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 24px;
    width: 100%;
    max-width: 560px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    animation: modalIn 0.3s cubic-bezier(0.34,1.2,0.64,1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal-header {
    padding: 32px 32px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .modal-title { font-size: 24px; font-weight: 200; letter-spacing: -0.5px; color: var(--dark); }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--light); line-height: 1; }
  .modal-close:hover { color: var(--dark); }

  .modal-body { padding: 24px 32px 32px; }

  .modal-field { margin-bottom: 20px; }
  .modal-field label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); margin-bottom: 8px; }
  .modal-field input, .modal-field select {
    width: 100%;
    padding: 14px 18px;
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 300;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--terracota); }

  .modal-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modules-check-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .module-check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--mid);
  }
  .module-check-item:hover { background: var(--surface); }
  .module-check-item.checked { background: rgba(196,133,106,0.08); color: var(--dark); }

  .module-check-item input[type="checkbox"] { accent-color: var(--terracota); }

  .modal-actions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .modal-action-btn {
    padding: 12px 16px;
    background: var(--surface);
    border: 1.5px solid rgba(30,28,26,0.08);
    border-radius: 12px;
    color: var(--mid);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .modal-action-btn:hover { background: var(--white); color: var(--dark); border-color: rgba(30,28,26,0.15); }
  .modal-action-btn span { font-size: 15px; }
  .modal-action-btn.btn-danger { color: #e07070; }
  .modal-action-btn.btn-danger:hover { background: rgba(220,80,80,0.1); }
  .modal-action-btn.btn-success { color: #6dbf8a; }
  .modal-action-btn.btn-success:hover { background: rgba(60,160,90,0.1); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 28px;
  }

  .btn-cancel {
    padding: 12px 24px;
    background: none;
    border: 1px solid var(--light);
    border-radius: 100px;
    font-size: 13px;
    font-family: inherit;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--dark); color: var(--dark); }

  .btn-save {
    padding: 12px 28px;
    background: var(--dark);
    color: var(--white);
    border: none;
    border-radius: 100px;
    font-size: 13px;
    letter-spacing: 1px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-save:hover { background: var(--terracota); }

  /* DETAIL VIEW */
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .detail-card {
    background: var(--bg);
    border-radius: 14px;
    padding: 18px 20px;
  }

  .detail-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--mid); margin-bottom: 6px; }
  .detail-val { font-size: 16px; color: var(--dark); font-weight: 400; }

  .link-card {
    background: var(--dark);
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .link-card:hover { background: var(--terracota); }
  .link-url { font-size: 14px; color: var(--rosa); letter-spacing: 1px; font-family: monospace; }
  .link-copy { font-size: 11px; color: var(--light); }

  /* ANIMATIONS */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .section { animation: fadeIn 0.3s ease; }

  /* PILL counts in header */
  .count-pill {
    display: inline-flex;
    align-items: center;
    background: var(--surface);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--mid);
    margin-left: 10px;
    vertical-align: middle;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--dark);
    color: var(--white);
    padding: 14px 24px;
    border-radius: 100px;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">SMILE</div>
    <div class="login-sub">Panel de administración</div>
    <div class="login-field">
      <label>Email</label>
      <input type="text" id="loginEmail" placeholder="Usuario" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-error" id="loginError">Credenciales incorrectas</div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">SMILE</div>
    <div class="sidebar-role">Admin</div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-section="overview" onclick="showSection('overview')">
        <span class="nav-icon">📊</span> Overview
      </div>
      <div class="nav-item" data-section="clinicas" onclick="showSection('clinicas')">
        <span class="nav-icon">🏥</span> Clínicas
      </div>
      <div class="nav-item" data-section="nueva" onclick="showSection('nueva')">
        <span class="nav-icon">✦</span> Nueva clínica
      </div>
      <div class="nav-item" data-section="contactos" onclick="showSection('contactos')">
        <span class="nav-icon">💬</span> Contactos
      </div>

<script>
// ── FIREBASE ──────────────────────────────────────────
const firebaseConfig = {

// ── AUTH ──────────────────────────────────────────────

const ADMIN_CREDS = { user: 'gabo', password: '4498' };

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (email === ADMIN_CREDS.user && pass === ADMIN_CREDS.password) {
    document.getElementById('loginScreen').style.display = 'none';

    document.getElementById('loginError').style.display = 'block';

}

function doLogout() {
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';

// ── STATE ─────────────────────────────────────────────
let clinicas = [];
let currentSection = 'overview';

// ── INIT ──────────────────────────────────────────────
async function initApp() {
  try {
    const auth = firebase.auth();
    if (!auth.currentUser) await auth.signInAnonymously();
  } catch(e) {
    console.warn('[Admin] Firebase auth warning:', e.message);
  }
  await loadClinicas();
  showSection('overview');
  actualizarErrorBadge();
}

async function recargarAdmin() {
  const btn = document.querySelector('[onclick="recargarAdmin()"]');
  if (btn) { btn.textContent = '↻ Cargando...'; btn.disabled = true; }
  await loadClinicas();
  showSection(currentSection);
  if (btn) { btn.textContent = '↻ Actualizar'; btn.disabled = false; }
}

async function loadClinicas() {
  try {
    const snap = await db.collection('clinicas').get();
    clinicas = await Promise.all(snap.docs.map(async doc => {
      const data = doc.data();
      // Load config sub-doc if exists
      let config = {};
      try {
        const cfgDoc = await db.collection('clinicas').doc(doc.id)
          .collection('config').doc('settings').get();
        if (cfgDoc.exists) config = cfgDoc.data();
      } catch(e) {}

      // Count patients
      let pacientes = 0;
      try {
        const pacSnap = await db.collection('clinicas').doc(doc.id)
          .collection('pacientes').get();
        pacientes = pacSnap.size;
      } catch(e) {
        pacientes = (data.pacientes || []).length;
      }

      return {
        id: doc.id,
        nombre: config.nombre || data.nombre || doc.id,
        ciudad: config.ciudad || data.ciudad || '—',
        color: config.color || '#C4856A',
        plan: config.plan || 'clinica',
        modulos: config.modulos || [],
        activa: config.activa !== false,
        trial: config.trialHasta ? new Date(config.trialHasta) > new Date() : false,
        trialHasta: config.trialHasta || null,
        adminEmail: config.adminEmail || '—',
        clinicaPadre: config.clinicaPadre || null,
        esSedePrincipal: config.esSedePrincipal || false,
        nombreSede: config.nombreSede || null,
        creadaEn: config.creadaEn || data.lastUpdated || null,
        migratedAt: data.migratedAt || null,
        pacientes,
        facturas: (data.facturas || []).length,
        citas: (data.citas || []).length,
        personalCount: (data.personal || []).length,
        // Calculate MRR from plan + modules
        mrr: calcMRR(config.plan, config.modulos, (data.personal||[]).length),
        waName:  config.contactoWA?.nombre || config.waName  || data.waName  || '',
        waCargo: config.contactoWA?.cargo  || config.waCargo || data.waCargo || '',
        waPhone: config.contactoWA?.phone  || config.waPhone || data.waPhone || '',
        lastLogin: data.lastLogin || config.lastLogin || data.lastUpdated || null,
        raw: { config: config, ...data },
        config,
      };
    }));
  } catch(e) {
    console.error('Error loading clinicas:', e);
    clinicas = [];
  }
}

function calcMRR(plan, modulos = [], personalCount = 0) {
  const BASE = plan === 'solo' ? 990 : 1200;
  const MODULE_PRICES = {
    laboratorio: 300, nomina: 300, inventario: 300,
    reportes: 300, multisucursal: 800,
    // ncf y expediente: incluidos en el plan base
  };
  const extraUsers = Math.max(0, personalCount - 1);
  const modulesTotal = (modulos || []).reduce((s, m) => s + (MODULE_PRICES[m] || 0), 0);
  return BASE + modulesTotal + (extraUsers * 150);
}

// ── SECTIONS ──────────────────────────────────────────
async function showSection(section) {
  currentSection = section;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector(`.nav-item[data-section="${section}"]`);
  if (navEl) navEl.classList.add('active');

  const main = document.getElementById('main');
  if (section === 'overview') renderOverview(main);
  else if (section === 'clinicas') renderClinicas(main);
  else if (section === 'nueva') renderNuevaClinica(main);
  else if (section === 'contactos') renderContactos(main);
  else if (section === 'errores') await renderErrorLog(main);
  else if (section === 'precios') await renderPrecios(main);

}

        </div>

  main.innerHTML = `

function filterClinicas(filter, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  if (filter === 'activas') list = clinicas.filter(c => c.activa && !c.trial);
  if (filter === 'trial')   list = clinicas.filter(c => c.trial);
  document.getElementById('clinicasTableWrap').innerHTML = renderClinicsTable(list);
}

function updateMRRPreview() {
  const plan = document.getElementById('new-plan')?.value || 'clinica';
  const modulos = [...document.querySelectorAll('.modules-check-grid input:checked')].map(i => i.value);
  const mrr = calcMRR(plan, modulos, 1);
  const el = document.getElementById('new-mrr-preview');
  if (el) el.textContent = 'RD$' + mrr.toLocaleString();
}

function autoSlug(val) {
  const slug = val.toLowerCase()
    .replace(/[áàä]/g,'a').replace(/[éèë]/g,'e')
    .replace(/[íìï]/g,'i').replace(/[óòö]/g,'o')
    .replace(/[úùü]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const el = document.getElementById('new-id');
  if (el) el.value = slug;
}

async function crearClinica() {
  const nombre = document.getElementById('new-nombre').value.trim();
  const id     = document.getElementById('new-id').value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
  const ciudad = document.getElementById('new-ciudad').value.trim();
  const plan   = document.getElementById('new-plan').value;
  const email  = document.getElementById('new-email').value.trim();
  const color  = document.getElementById('new-color').value;
  const modulos = [...document.querySelectorAll('.modules-check-grid input:checked')].map(i => i.value);

  if (!nombre || !id || !email) {
    showToast('⚠️ Nombre, ID y email son requeridos');
    return;
  }

  // Check if ID already exists
  const existing = await db.collection('clinicas').doc(id).get();
  if (existing.exists) {
    showToast('⚠️ Ya existe una clínica con ese ID');
    return;
  }

  try {
    // Create main document
    await db.collection('clinicas').doc(id).set({
      facturas: [], personal: getDefaultPersonal(nombre),
      gastos: [], avances: [], cuadresDiarios: {},
      citas: [], laboratorios: [], reversiones: [], auditLogs: [],
      pacientes: [], usaSubcollectionPacientes: true,
      lastUpdated: new Date().toISOString(),
      nombre, ciudad, plan, adminEmail: email, color, modulos
    });

    // Create config
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({
        nombre, clinicaId: id, ciudad, plan,
        adminEmail: email, color, modulos,
        activa: true, trial: true, creadaEn: new Date().toISOString(),
        trialHasta: getTrial14Days()
      });

    showToast('✅ Clínica creada exitosamente');
    await loadClinicas();
    showSection('clinicas');
  } catch(e) {
    showToast('❌ Error: ' + e.message);
    console.error(e);
  }
}

function getDefaultPersonal(clinicNombre) {
  return [
    { id: '1', nombre: 'Administrador', tipo: 'regular', password: 'admin123', isAdmin: true, canAccessReception: true }
  ];
}

function getTrial14Days() {
  const d = new Date();
  d.setDate(d.getDate() + 14);
  return d.toISOString();
}

// ── ACTIONS ───────────────────────────────────────────

function openApp(id) {
  const base = window.location.origin + window.location.pathname.replace('admin.html','');
  window.open(base + 'app.html?clinica=' + id, '_blank');
}

function copyClinicLink(id) {
  const base = window.location.origin + window.location.pathname.replace('admin.html','');
  navigator.clipboard?.writeText(base + 'app.html?clinica=' + id)
    .then(() => showToast('🔗 Link copiado'));
}

async function toggleStatus(id) {
  const c = clinicas.find(x => x.id === id);
  if (!c) return;
  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').set({ activa: !c.activa }, { merge: true });
    closeModal();
    showToast(c.activa ? '⏸ Clínica pausada' : '✅ Clínica reactivada');
    await loadClinicas();
    showSection(currentSection);
  } catch(e) { showToast('❌ ' + e.message); }
}

// ── RESET CONTRASEÑA ─────────────────────────────────
function openResetPassword(id) {
  const c = clinicas.find(x => x.id === id);
  if (!c) return;
  const newPass      = Math.random().toString(36).slice(2,8).toUpperCase();
  const adminNombre  = c.raw?.personal?.find(p => p.isAdmin)?.nombre
                    || c.raw?.personal?.[0]?.nombre
                    || 'Administrador';

  document.getElementById('modalTitle').textContent = '🔑 Reset contraseña — ' + c.nombre;
  document.getElementById('modalBody').innerHTML = `
    <div style="text-align:center;padding:16px 0 24px">
      <div style="font-size:13px;color:var(--mid);margin-bottom:28px;line-height:1.7">
        Se generará una nueva contraseña para el admin.<br>Compártela con el cliente por WhatsApp.
      </div>
      <div style="background:var(--bg);border-radius:16px;padding:28px;margin-bottom:20px">
        <div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--mid);margin-bottom:12px">Nueva contraseña</div>
        <div style="font-family:monospace;font-size:36px;letter-spacing:8px;color:var(--terracota)">${newPass}</div>
        <div style="font-size:12px;color:var(--mid);margin-top:12px">Usuario: <strong>${adminNombre}</strong></div>
      </div>
      <div style="font-size:12px;color:var(--light)">Se guarda en Firebase al confirmar.</div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="confirmResetPassword('${id}','${newPass}')">Confirmar y guardar</button>
    </div>
  `;
}

async function confirmResetPassword(id, newPass) {
  try {
    const doc     = await db.collection('clinicas').doc(id).get();
    const pers    = doc.data()?.personal || [];
    const updated = pers.length
      ? pers.map((p,i) => (p.isAdmin || i===0) ? {...p, password: newPass} : p)
      : [{ id:'1', nombre:'Administrador', isAdmin:true, password:newPass, canAccessReception:true }];
    await db.collection('clinicas').doc(id).update({ personal: updated });
    closeModal();
    showToast('✅ Contraseña cambiada: ' + newPass);
    await loadClinicas();
  } catch(e) { showToast('❌ ' + e.message); }
}

// ── EXTENDER TRIAL ────────────────────────────────────
function extendTrial(id) {
  const c   = clinicas.find(x => x.id === id);
  if (!c) return;
  const base = c.trialHasta
    ? new Date(Math.max(new Date(c.trialHasta), new Date()))
    : new Date();
  const d7   = new Date(base); d7.setDate(d7.getDate()+7);
  const d14  = new Date(base); d14.setDate(d14.getDate()+14);
  const d30  = new Date(base); d30.setDate(d30.getDate()+30);
  const fmt  = d => d.toLocaleDateString('es-DO',{day:'numeric',month:'long',year:'numeric'});
  const btn  = (days, date) => `
    <button onclick="confirmExtendTrial('${id}','${date.toISOString()}')"
      style="padding:16px 20px;background:var(--white);border:1.5px solid rgba(30,28,26,0.08);
             border-radius:12px;color:var(--dark);font-family:inherit;font-size:14px;
             cursor:pointer;text-align:left;width:100%;transition:background 0.2s,border-color 0.2s"
      onmouseover="this.style.background='rgba(196,133,106,0.08)';this.style.borderColor='var(--terracota)'"
      onmouseout="this.style.background='var(--white)';this.style.borderColor='rgba(30,28,26,0.08)'">
      <span style="color:var(--terracota);font-weight:500">+${days} días</span>
      <span style="color:var(--mid);font-size:12px;float:right">hasta ${fmt(date)}</span>
    </button>`;

  document.getElementById('modalTitle').textContent = '📅 Extender trial — ' + c.nombre;
  document.getElementById('modalBody').innerHTML = `
    <div style="padding:8px 0 4px">
      <div style="font-size:13px;color:var(--mid);margin-bottom:20px">
        Trial actual: <strong style="color:${c.trial?'var(--terracota)':'#999'}">${c.trialHasta ? fmt(new Date(c.trialHasta)) : 'Vencido'}</strong>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${btn(7,d7)}${btn(14,d14)}${btn(30,d30)}
      </div>
    </div>
    <div class="modal-footer" style="margin-top:20px">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  `;
}

async function confirmExtendTrial(id, newDate) {
  try {
    await db.collection('clinicas').doc(id)
      .collection('config').doc('settings').update({
        trial: true,
        trialHasta: newDate,
        trialExtendidoEn: new Date().toISOString()
      });
    closeModal();
    showToast('✅ Trial extendido hasta '
      + new Date(newDate).toLocaleDateString('es-DO',{day:'numeric',month:'long'}));
    await loadClinicas();
    showSection(currentSection);
  } catch(e) { showToast('❌ ' + e.message); }
}

function copyToClipboard(text) {
  navigator.clipboard?.writeText(text).then(() => showToast('✓ Link copiado'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>

function getSeveridadLabel(sev) {
  const labels = { critico: '🔴 Crítico', error: '🟠 Error', aviso: '🟡 Aviso', info: '🔵 Info' };
  return labels[sev] || '⚪ Desconocido';
}

function formatErrorTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('es-DO', { day: 'numeric', month: 'short', year: 'numeric' }) +
         ' · ' + d.toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit' });
}

let _errFiltro = 'todos';
let _errLogs   = [];  // cache local de los logs cargados

async function cargarErrorLogs() {
  // Leer auditLogs de TODAS las clínicas y filtrar los que son errores
  const errores = [];
  for (const clinica of clinicas) {
    try {
      const doc = await db.collection('clinicas').doc(clinica.id).get();
      if (!doc.exists) continue;
      const data = doc.data();
      const logs = data.auditLogs || [];
      // Filtrar solo entradas de error (las que tienen campo 'error' o tipo 'error')
      logs.filter(l => l.tipo === 'error' || l.error).forEach(l => {
        errores.push({ ...l, clinicaId: clinica.id, clinicaNombre: clinica.nombre || clinica.id });
      });
    } catch(e) { /* clínica inaccesible, skip */ }
  }
  // También leer de la colección global smile_errors si existe
  try {
    const errSnap = await db.collection('smile_errors').orderBy('fecha', 'desc').limit(200).get();
    errSnap.docs.forEach(d => {
      const e = d.data();
      errores.push({ ...e, _docId: d.id });
    });
  } catch(e) { /* colección no existe aún */ }

  // Ordenar por fecha desc
  errores.sort((a, b) => new Date(b.fecha || 0) - new Date(a.fecha || 0));
  _errLogs = errores;
  return errores;
}

function toggleErrorCard(id) {
  const detail = document.getElementById('detail-' + id);
  const card   = document.getElementById('card-' + id);
  if (!detail) return;
  detail.classList.toggle('open');
  card.classList.toggle('expanded');
}

function marcarResuelto(id, activo, event) {
  event.stopPropagation();
  const btn = document.getElementById('resolve-' + id);
  const idx = _errLogs.findIndex(e => e._docId === id || e.id === id);
  if (idx < 0) return;
  _errLogs[idx]._resuelto = activo;
  if (activo) {
    btn.textContent = '✓ Resuelto';
    btn.className = 'resolve-btn resolved';
    btn.onclick = (ev) => marcarResuelto(id, false, ev);
    // Guardar en Firestore si tiene docId
    if (_errLogs[idx]._docId) {
      db.collection('smile_errors').doc(_errLogs[idx]._docId).update({ resuelto: true, resueltoEn: new Date().toISOString() }).catch(() => {});
    }
  } else {
    btn.textContent = '↩ Reabrir';
    btn.className = 'resolve-btn unresolved';
    btn.onclick = (ev) => marcarResuelto(id, true, ev);
    if (_errLogs[idx]._docId) {
      db.collection('smile_errors').doc(_errLogs[idx]._docId).update({ resuelto: false }).catch(() => {});
    }
  }
}

function filtrarYRenderErrorList(container) {
  let lista = _errLogs;
  if (_errFiltro === 'abiertos')       lista = lista.filter(e => !e._resuelto && !e.resuelto);
  else if (_errFiltro === 'resueltos') lista = lista.filter(e => e._resuelto || e.resuelto);
  else if (_errFiltro !== 'todos')     lista = lista.filter(e => e.severidad === _errFiltro);

  if (lista.length === 0) {
    container.innerHTML = `
      <div class="error-log-empty">
        <div class="empty-icon">${_errFiltro === 'resueltos' ? '✅' : '🎉'}</div>
        <div class="empty-title">${_errFiltro === 'resueltos' ? 'No hay errores resueltos aún' : '¡Sin errores registrados!'}</div>
        <div class="empty-sub">Cuando algo falle en cualquier clínica, aparecerá aquí con instrucciones para resolverlo.</div>
      </div>`;
    return;
  }

  container.innerHTML = lista.map((err, i) => {
    const uid = err._docId || err.id || ('err-' + i);
    const kb  = ERROR_KB[err.codigoError] || ERROR_KB[err.codigo] || ERROR_KB['DEFAULT'];
    const sev = err.severidad || kb.severidad || 'error';
    const titulo = err.titulo || kb.titulo || 'Error sin clasificar';
    const resuelto = err._resuelto || err.resuelto;

    return `
    <div class="error-card ${resuelto ? 'opacity: 0.6' : ''}" id="card-${uid}" onclick="toggleErrorCard('${uid}')"
         style="${resuelto ? 'opacity:0.55' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div style="flex:1;min-width:0">
          <div class="error-card-severity sev-${sev}">${getSeveridadLabel(sev)}</div>
          <div class="error-title">${titulo}</div>
          <div class="error-meta">
            🏥 ${err.clinicaNombre || err.clinicaId || 'Sin clínica'} &nbsp;·&nbsp;
            🕐 ${formatErrorTime(err.fecha)} &nbsp;·&nbsp;
            👤 ${err.usuario || 'Sistema'}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <button id="resolve-${uid}"
            class="resolve-btn ${resuelto ? 'resolved' : 'unresolved'}"
            onclick="${resuelto ? `marcarResuelto('${uid}',false,event)` : `marcarResuelto('${uid}',true,event)`}">
            ${resuelto ? '✓ Resuelto' : '↩ Marcar resuelto'}
          </button>
          <span style="font-size:18px;color:var(--mid);transform:rotate(${0}deg);transition:transform 0.2s" id="chevron-${uid}">›</span>
        </div>
      </div>

      <div class="error-detail" id="detail-${uid}">
        <div class="error-section-title">¿Qué pasó?</div>
        <div class="error-explanation">${kb.explicacion || err.mensaje || 'Sin descripción disponible.'}</div>

        <div class="error-section-title">Cómo resolverlo</div>
        <div class="fix-steps">
          ${(kb.pasos || []).map((p, n) => `
            <div class="fix-step">
              <div class="fix-step-num">${n + 1}</div>
              <div class="fix-step-text"><b>${p.accion}</b> — ${p.detalle}</div>
            </div>`).join('')}
        </div>

        ${(err.detalle || err.rawError) ? `
          <div class="error-section-title">Detalle técnico (para desarrolladores)</div>
          <div class="error-raw">${(err.detalle || err.rawError || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
        ` : ''}
      </div>
    </div>`;
  }).join('');
}

async function renderErrorLog(main) {
  main.innerHTML = `
    <div class="section">
      <div class="page-header">
        <div>
          <div class="page-title">Log de Errores</div>
          <div class="page-sub">Cada error viene con una explicación y pasos para resolverlo</div>
        </div>
        <button class="header-btn" onclick="recargarErrorLog()" style="background:none;border:1px solid var(--light);color:var(--mid)">
          ↻ Actualizar
        </button>
      </div>

      <div class="error-filters">
        <button class="filter-pill active" onclick="setErrFiltro('todos', this)">Todos</button>
        <button class="filter-pill" onclick="setErrFiltro('abiertos', this)">Sin resolver</button>
        <button class="filter-pill" onclick="setErrFiltro('resueltos', this)">Resueltos</button>
        <button class="filter-pill" onclick="setErrFiltro('critico', this)">🔴 Crítico</button>
        <button class="filter-pill" onclick="setErrFiltro('error', this)">🟠 Error</button>
        <button class="filter-pill" onclick="setErrFiltro('aviso', this)">🟡 Aviso</button>
        <button class="filter-pill" onclick="setErrFiltro('info', this)">🔵 Info</button>
      </div>

      <div id="errorLogContainer">
        <div style="text-align:center;padding:60px 20px;color:var(--mid)">
          <div style="font-size:24px;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block">⏳</div>
          <div>Cargando errores de todas las clínicas...</div>
        </div>
      </div>
    </div>
  `;

  try {
    await cargarErrorLogs();
  } catch(e) {
    console.error('[Admin] Error cargando error logs:', e);
  }
  // Verificar que el container sigue en el DOM (el usuario pudo navegar a otro tab)
  const container = document.getElementById('errorLogContainer');
  if (container) filtrarYRenderErrorList(container);
}

function setErrFiltro(filtro, btn) {
  _errFiltro = filtro;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const container = document.getElementById('errorLogContainer');
  if (container) filtrarYRenderErrorList(container);
}

async function recargarErrorLog() {
  const container = document.getElementById('errorLogContainer');
  if (!container) return;
  container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--mid)">↻ Actualizando...</div>';
  await cargarErrorLogs();
  filtrarYRenderErrorList(container);
}

// Actualizar el badge de errores en el nav cuando carga el admin
async function actualizarErrorBadge() {
  try {
    const snap = await db.collection('smile_errors')
      .where('resuelto', '==', false).limit(99).get();
    const badge = document.getElementById('errorBadge');
    if (!badge) return;
    if (snap.size > 0) {
      badge.textContent = snap.size > 9 ? '9+' : snap.size;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
  } catch(e) { /* colección no existe aún — normal */ }
}

async function renderPrecios(main) {

    modulos: { laboratorio: 300, nomina: 300, inventario: 300, reportes: 300, multisucursal: 800, expediente: 300 }

    const snap = await db.collection('smile_config').doc('precios').get();
    if (snap.exists) {
      const d = snap.data();
      precios.base_clinica = d.base_clinica ?? precios.base_clinica;
      precios.base_solo    = d.base_solo    ?? precios.base_solo;
      if (d.modulos) Object.assign(precios.modulos, d.modulos);
    }
  } catch(e) { console.warn('[Admin] No se pudieron cargar precios:', e.message); }

  const field = (label, key, val, nested) => `
    <div style="display:flex;justify-content:space-between;align-items:center;
                padding:14px 0;border-bottom:1px solid rgba(30,28,26,0.06);">
      <div>
        <div style="font-size:14px;color:var(--dark)">${label}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:13px;color:var(--mid)">RD$</span>
        <input type="number" id="precio_${key}" value="${val}" min="0" step="50"
          style="width:100px;padding:8px 12px;border:1.5px solid rgba(30,28,26,0.12);
                 border-radius:10px;font-size:15px;font-family:inherit;text-align:right;
                 background:var(--white);color:var(--dark);"
          onfocus="this.style.borderColor='var(--terracota)'"
          onblur="this.style.borderColor='rgba(30,28,26,0.12)'">
        <span style="font-size:11px;color:var(--light)">/mes</span>
      </div>
    </div>`;

  main.innerHTML = `
    <div style="max-width:560px;margin:0 auto;padding:32px 24px;">
      <div style="font-size:22px;font-weight:300;color:var(--dark);margin-bottom:4px">Precios globales</div>
      <div style="font-size:13px;color:var(--mid);margin-bottom:32px">
        Aplican a todas las clínicas. Los cambios se reflejan en la app al instante.
      </div>

      <!-- Planes base -->
      <div style="background:var(--white);border-radius:16px;padding:20px 24px;
                  border:1.5px solid rgba(30,28,26,0.07);margin-bottom:16px;">
        <div style="font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;
                    color:var(--mid);margin-bottom:4px">Planes base</div>
        ${field('Plan Clínica', 'base_clinica', precios.base_clinica)}
        ${field('Plan Solo', 'base_solo', precios.base_solo, false)}
      </div>

      <!-- Módulos adicionales -->
      <div style="background:var(--white);border-radius:16px;padding:20px 24px;
                  border:1.5px solid rgba(30,28,26,0.07);margin-bottom:24px;">
        <div style="font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;
                    color:var(--mid);margin-bottom:4px">Módulos adicionales</div>
        ${field('Laboratorio',        'mod_laboratorio',   precios.modulos.laboratorio)}
        ${field('Nómina',             'mod_nomina',         precios.modulos.nomina)}
        ${field('Inventario',         'mod_inventario',     precios.modulos.inventario)}
        ${field('Reportes avanzados', 'mod_reportes',       precios.modulos.reportes)}
        ${field('Sucursal adicional', 'mod_multisucursal',  precios.modulos.multisucursal)}
        ${field('Expediente clínico', 'mod_expediente',     precios.modulos.expediente)}
      </div>

      <button onclick="guardarPrecios()" id="btnGuardarPrecios"
        style="width:100%;padding:16px;background:var(--dark);color:var(--white);
               border:none;border-radius:12px;font-size:12px;font-family:inherit;
               letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
               transition:background 0.2s;">
        Guardar precios
      </button>
      <div id="preciosMsg" style="text-align:center;margin-top:12px;font-size:13px;
                                   color:var(--mid);min-height:20px;"></div>
    </div>
  `;
}

async function guardarPrecios() {
  const btn = document.getElementById('btnGuardarPrecios');
  const msg = document.getElementById('preciosMsg');
  btn.textContent = 'Guardando...';
  btn.disabled = true;

  const get = id => parseFloat(document.getElementById(id)?.value) || 0;

  const precios = {
    base_clinica: get('precio_base_clinica'),
    base_solo:    get('precio_base_solo'),
    modulos: {
      laboratorio:   get('precio_mod_laboratorio'),
      nomina:        get('precio_mod_nomina'),
      inventario:    get('precio_mod_inventario'),
      reportes:      get('precio_mod_reportes'),
      multisucursal: get('precio_mod_multisucursal'),
      expediente:    get('precio_mod_expediente'),
    },
    actualizadoEn: new Date().toISOString(),
  };

  try {
    await db.collection('smile_config').doc('precios').set(precios);
    btn.textContent = '✓ Precios guardados';
    btn.style.background = 'var(--green)';
    msg.textContent = 'Los cambios se reflejan en la app al instante.';
    setTimeout(() => {
      btn.textContent = 'Guardar precios';
      btn.style.background = '';
      btn.disabled = false;
      msg.textContent = '';
    }, 3000);
  } catch(e) {
    btn.textContent = 'Error — intenta de nuevo';
    btn.style.background = 'var(--red)';
    msg.textContent = e.message;
    setTimeout(() => {
      btn.textContent = 'Guardar precios';
      btn.style.background = '';
      btn.disabled = false;
    }, 3000);
  }
}
