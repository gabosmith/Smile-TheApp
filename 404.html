<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SMILE — Redirigiendo...</title>
  <style>
    body {
      background: #EEEAE4;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      color: #1E1C1A;
    }
    .msg {
      text-align: center;
      font-size: 14px;
      font-weight: 300;
      color: #9C9189;
    }
    .dot {
      width: 8px; height: 8px;
      background: #C4856A;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
      margin: 0 3px;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="msg">
    <div style="font-size:24px;margin-bottom:16px">SMILE</div>
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div style="margin-top:12px">Cargando tu clínica...</div>
  </div>

  <script>
    // GitHub Pages 404 redirect trick
    // Captures the full URL including query params and redirects properly
    (function() {
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;

      // Get the base repo path (/smile-app/)
      const segments = path.split('/');
      // segments = ['', 'smile-app', 'app.html'] for example
      // Rebuild correctly
      const base = '/' + segments[1]; // /smile-app

      // Build the redirect target
      // Store original destination in sessionStorage for the main page to read
      sessionStorage.setItem('smile_redirect', path + search + hash);

      // Redirect to root of the repo
      const redirectTo = base + '/app.html' + search + hash;

      // Only redirect if we have a valid target
      if (search && search.includes('clinica=')) {
        window.location.replace(redirectTo);
      } else if (path.includes('app.html') || path.includes('admin.html') || path.includes('smile-onboarding.html')) {
        // Try to serve the correct page
        window.location.replace(base + '/' + segments[segments.length - 1] + search + hash);
      } else {
        // Unknown route — go home
        window.location.replace(base + '/index.html');
      }
    })();
  </script>
</body>
</html>
