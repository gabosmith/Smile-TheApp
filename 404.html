<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMILE — Página no encontrada</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    body {
      background: #EEEAE4;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #6B635C;
    }
    .wrap {
      text-align: center;
      padding: 40px 24px;
    }
    .logo {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 7px;
      color: #A89F96;
      margin-bottom: 48px;
      text-transform: uppercase;
    }
    .code {
      font-size: 72px;
      font-weight: 200;
      letter-spacing: -3px;
      color: #6B635C;
      line-height: 1;
      margin-bottom: 16px;
    }
    .msg {
      font-size: 16px;
      color: #A89F96;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      background: #EEEAE4;
      color: #6B635C;
      border: none;
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 5px 5px 12px rgba(185,177,167,.55), -4px -4px 10px rgba(255,255,255,.95);
      transition: all .25s;
    }
    .btn:hover {
      box-shadow: 8px 8px 20px rgba(182,174,164,.60), -6px -6px 16px rgba(255,255,255,.98);
      color: #7D8EA0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">SMILE</div>
    <div class="code">404</div>
    <div class="msg">Esta página no existe.</div>
    <a class="btn" href="/">Volver al inicio →</a>
  </div>
</body>
</html>
